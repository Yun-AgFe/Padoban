<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 파도반</title>
    <!-- Tailwind CSS (디자인) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (기능) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (코드 번역기) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
      body, html { margin: 0; padding: 0; min-height: 100vh; background-color: #f0f9ff; }
      #root { min-height: 100vh; }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #7dd3fc; }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // ==========================================
      // 🚨 새로 배포한 웹앱 URL (끝에 ?api=true 필수)
      // ==========================================
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzev5JeOhBVHDe1Uy6EIFSEOH_BEP2YTncgLjrQB4kRIWc-hCk3uv0hbrcdoiHjAMIj/exec?api=true'; 
      const EXP_PER_LEVEL = 100;

      const safeText = (val) => {
        if (val === null || val === undefined) return '';
        if (typeof val === 'object') return JSON.stringify(val);
        return String(val);
      };

      const isImageUrl = (str) => {
        if (!str || typeof str !== 'string') return false;
        return str.startsWith('http://') || str.startsWith('https://') || str.startsWith('data:image/');
      };

      const ColorizeText = ({ text }) => {
        if (!text) return <span className="text-slate-400 text-xs">정보 없음</span>;
        return (
          <div className="flex gap-[1px] tracking-widest text-lg">
            {String(text).split('').map((char, idx) => {
              if (/[a-zA-Z]/.test(char)) {
                return <span key={idx} className="text-blue-500 font-black">{char}</span>; 
              } else if (/[0-9]/.test(char)) {
                return <span key={idx} className="text-rose-500 font-black">{char}</span>; 
              }
              return <span key={idx} className="text-slate-600 font-bold">{char}</span>; 
            })}
          </div>
        );
      };

      function App() {
        const [loading, setLoading] = useState(true);
        const [syncing, setSyncing] = useState(false);
        
        // 💡 교사용 자동 접속 숏컷 제거, localStorage 확인만 수행
        const [currentUser, setCurrentUser] = useState(() => {
          const savedUser = localStorage.getItem('padoUser');
          if (savedUser) {
            try { return JSON.parse(savedUser); } catch(e) {}
          }
          return null;
        });
        
        const [missingDbSheets, setMissingDbSheets] = useState([]);
        const [toastMsg, setToastMsg] = useState('');
        
        const [showPwdModal, setShowPwdModal] = useState(false);

        const [dbData, setDbData] = useState({
          Users: [], Announcements: [], ShopItems: [], PendingItems: [], Emotions: [], HallOfFame: [], Tasks: [], Jobs: [], PurchaseLogs: [], Records: [], RecordCategories: [], Letters: []
        });

        const [loginName, setLoginName] = useState('');
        const [loginPwd, setLoginPwd] = useState('');
        const [loginError, setLoginError] = useState('');

        const showToast = (msg) => {
          setToastMsg(msg);
          setTimeout(() => setToastMsg(''), 3000);
        };

        const fetchData = async () => {
          setLoading(true);
          try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            
            const requiredSheets = ['Users', 'Announcements', 'ShopItems', 'PendingItems', 'Emotions', 'HallOfFame', 'Tasks', 'Jobs', 'PurchaseLogs', 'Records', 'RecordCategories', 'Letters'];
            const missingSheets = requiredSheets.filter(sheet => !data[sheet]);
            
            if (missingSheets.length > 0) {
              setMissingDbSheets(missingSheets);
              showToast(`⚠️ 시트 누락: [ ${missingSheets.join(', ')} ]`);
            } else {
              setMissingDbSheets([]);
            }

            const safeParseArray = (val) => {
              if (!val) return [];
              if (typeof val === 'number') return [val]; 
              if (typeof val === 'string') {
                try { 
                  const parsed = JSON.parse(val); 
                  return Array.isArray(parsed) ? parsed : [];
                } catch(e) { return []; }
              }
              if (Array.isArray(val)) return val;
              return [];
            };

            const parsedUsers = (Array.isArray(data.Users) ? data.Users : []).map(u => ({
              ...u,
              role: u.name === '윤은철' ? 'teacher' : 'student',
              ownedItems: safeParseArray(u.ownedItems),
              equippedItems: safeParseArray(u.equippedItems),
              ownedTitles: safeParseArray(u.ownedTitles),
              intro: safeText(u.intro),
              faceUrl: safeText(u.faceUrl), 
              imoduId: safeText(u.imoduId), 
              imoduPwd: safeText(u.imoduPwd),
              job: safeText(u.job)
            }));

            const parsedTasks = (Array.isArray(data.Tasks) ? data.Tasks : []).map(t => ({
              ...t,
              submittedUsers: safeParseArray(t.submittedUsers),
              approvedUsers: safeParseArray(t.approvedUsers)
            }));
            
            const parsedEmotions = (Array.isArray(data.Emotions) ? data.Emotions : []).map(e => ({
              ...e,
              likes: safeParseArray(e.likes),
              aiReply: safeText(e.aiReply)
            }));

            setDbData({
              ...data,
              Users: parsedUsers,
              Announcements: Array.isArray(data.Announcements) ? data.Announcements : [],
              ShopItems: Array.isArray(data.ShopItems) ? data.ShopItems : [],
              PendingItems: Array.isArray(data.PendingItems) ? data.PendingItems : [],
              Emotions: parsedEmotions,
              HallOfFame: Array.isArray(data.HallOfFame) ? data.HallOfFame : [],
              Tasks: parsedTasks,
              Jobs: Array.isArray(data.Jobs) ? data.Jobs : [],
              PurchaseLogs: Array.isArray(data.PurchaseLogs) ? data.PurchaseLogs : [],
              Records: Array.isArray(data.Records) ? data.Records : [],
              RecordCategories: Array.isArray(data.RecordCategories) ? data.RecordCategories : [],
              Letters: Array.isArray(data.Letters) ? data.Letters : []
            });
          } catch (error) {
            console.error("Data Fetch Error:", error);
            if (error.message.includes("Failed to fetch") || error.name === "TypeError") {
              setMissingDbSheets(["(앱스스크립트 연결 문제)"]);
              showToast("🚨 SCRIPT_URL 문제이거나 앱스스크립트에 새 버전이 배포되지 않았습니다.");
            } else {
              showToast("데이터를 불러오는데 실패했습니다.");
            }
          } finally {
            setLoading(false);
          }
        };

        useEffect(() => { fetchData(); }, []);

        const syncToServer = async (sheetName, action, id, updateData) => {
          setSyncing(true);
          try {
            const res = await fetch(SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ sheetName, action, id, data: updateData })
            });
            const result = await res.json();
            if (result.success === false) alert(`저장 실패: ${result.error}`);
          } catch (error) {
            console.error("Sync Error:", error);
            alert("데이터를 저장하지 못했습니다. (네트워크 오류)");
          } finally {
            setSyncing(false);
          }
        };

        const handleLogin = (e) => {
          e.preventDefault();
          const user = dbData.Users.find(u => String(u.name).trim() === String(loginName).trim() && String(u.pwd).trim() === String(loginPwd).trim());
          
          if (user) {
            setCurrentUser(user);
            localStorage.setItem('padoUser', JSON.stringify(user)); // 브라우저에 저장
            setLoginError('');
            showToast(`환영합니다, ${user.name}님! 🌊`);

            const pwdStr = String(user.pwd).trim();
            if (user.role === 'student') {
              if (!/^\d{4}$/.test(pwdStr) || ['1234', '1111', '0000'].includes(pwdStr)) {
                setShowPwdModal(true);
              }
            }
          } else {
            setLoginError('이름이나 비밀번호가 틀렸습니다.');
          }
        };

        const updateStudentData = (studentId, updates) => {
          const studentToUpdate = dbData.Users.find(u => u.id === studentId);
          if (!studentToUpdate) return;
          
          const updatedStudent = { ...studentToUpdate, ...updates };
          
          if (updates.exp !== undefined) {
            updatedStudent.exp = Number(updatedStudent.exp || 0);
            updatedStudent.level = Math.floor(updatedStudent.exp / EXP_PER_LEVEL) + 1;
          }
          if (updates.money !== undefined) {
            updatedStudent.money = Number(updatedStudent.money || 0);
          }

          setDbData(prev => ({
            ...prev,
            Users: prev.Users.map(u => u.id === studentId ? updatedStudent : u)
          }));

          if (currentUser?.id === studentId) {
            setCurrentUser(updatedStudent);
          }

          const dataToSync = {
            exp: updatedStudent.exp,
            level: updatedStudent.level,
            money: updatedStudent.money,
            title: updatedStudent.title,
            ownedItems: updatedStudent.ownedItems,
            equippedItems: updatedStudent.equippedItems,
            ownedTitles: updatedStudent.ownedTitles,
            intro: updatedStudent.intro,
            faceUrl: updatedStudent.faceUrl,
            job: updatedStudent.job
          };
          if (updates.pwd !== undefined) dataToSync.pwd = updates.pwd;
          
          syncToServer('Users', 'UPDATE', studentId, dataToSync);
        };

        const batchUpdateStudents = async (studentIds, type, val) => {
          setSyncing(true);
          let newUsers = [...dbData.Users];
          const updatePayloads = [];

          studentIds.forEach(id => {
            const student = newUsers.find(u => u.id === id);
            if (student) {
              const updated = { ...student };
              
              if (type === 'exp') {
                updated.exp = Number(student.exp || 0) + Number(val);
                updated.level = Math.floor(updated.exp / EXP_PER_LEVEL) + 1;
              } else if (type === 'money') {
                updated.money = Number(student.money || 0) + Number(val);
              }
              
              newUsers = newUsers.map(u => u.id === id ? updated : u);

              updatePayloads.push({
                id: id,
                data: {
                  exp: updated.exp, 
                  level: updated.level, 
                  money: updated.money, 
                  title: updated.title,
                  ownedItems: updated.ownedItems, 
                  equippedItems: updated.equippedItems,
                  ownedTitles: updated.ownedTitles, 
                  intro: updated.intro,
                  faceUrl: updated.faceUrl,
                  job: updated.job
                }
              });
            }
          });

          setDbData(prev => ({ ...prev, Users: newUsers }));

          for (const payload of updatePayloads) {
            try {
              await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ sheetName: 'Users', action: 'UPDATE', id: payload.id, data: payload.data })
              });
            } catch(e) { console.error(e); }
          }
          setSyncing(false);
          showToast(`전체 학생에게 ${type === 'money' ? '용돈' : '경험치'} 지급이 완료되었습니다!`);
        };

        if (loading) {
          return (
            <div className="min-h-screen bg-[#FFFDF8] flex flex-col items-center justify-center space-y-4">
              <div className="text-6xl animate-bounce mb-4 drop-shadow-md">🌊</div>
              <p className="text-sky-800 font-bold text-lg">파도반 데이터를 불러오는 중...</p>
            </div>
          );
        }

        if (!currentUser) {
          return <LoginScreen loginName={loginName} setLoginName={setLoginName} loginPwd={loginPwd} setLoginPwd={setLoginPwd} handleLogin={handleLogin} loginError={loginError} />;
        }

        return (
          <div className="min-h-screen bg-gradient-to-b from-cyan-100 to-blue-100 text-slate-800 font-sans pb-24 md:pb-0 relative selection:bg-cyan-300">
            {toastMsg && (
              <div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-cyan-900/90 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-2xl z-50 font-bold flex items-center gap-2 animate-bounce">
                🫧 {toastMsg}
              </div>
            )}
            
            <header className="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-10 border-b border-cyan-300">
              <div className="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
                <h1 className="text-2xl font-black text-cyan-700 flex items-center gap-2">
                  🌊 파도반
                </h1>
                <div className="flex items-center gap-4">
                  {syncing && <span className="animate-spin inline-block text-cyan-600">🔄</span>}
                  
                  <button onClick={fetchData} className="p-2 text-stone-500 hover:text-cyan-600 transition" title="새로고침">
                    🔄
                  </button>

                  <span className="font-bold text-cyan-900 bg-cyan-200 px-3 py-1.5 rounded-full text-sm hidden md:inline-block">{safeText(currentUser.name)} {currentUser.role === 'teacher' ? '선생님' : '학생'}</span>
                  
                  <button onClick={() => {
                    setCurrentUser(null);
                    localStorage.removeItem('padoUser'); // 로그아웃 시 브라우저 기억 삭제
                    window.history.replaceState({}, document.title, window.location.pathname); 
                  }} className="p-2 text-2xl hover:scale-110 transition drop-shadow-sm" title="로그아웃">🚪</button>
                </div>
              </div>
            </header>

            {missingDbSheets.length > 0 && (
              <div className="max-w-5xl mx-auto p-4 mt-4 mx-4 bg-rose-100 text-rose-800 rounded-3xl border border-rose-300 shadow-sm">
                <h3 className="font-bold text-lg mb-1">🚨 구글 연결 오류</h3>
                <p className="text-sm mb-2">스프레드시트 데이터를 가져오지 못했습니다. 앱스스크립트에 새 버전을 배포해주세요.</p>
              </div>
            )}

            <main className="max-w-5xl mx-auto p-4 mt-4">
              {currentUser.role === 'teacher' ? (
                <TeacherDashboard currentUser={currentUser} dbData={dbData} setDbData={setDbData} updateStudentData={updateStudentData} syncToServer={syncToServer} showToast={showToast} batchUpdateStudents={batchUpdateStudents} />
              ) : (
                <StudentDashboard currentUser={currentUser} dbData={dbData} setDbData={setDbData} updateStudentData={updateStudentData} syncToServer={syncToServer} showToast={showToast} onOpenPwdModal={() => setShowPwdModal(true)} />
              )}
            </main>

            {showPwdModal && (
              <PasswordChangeModal 
                onClose={() => setShowPwdModal(false)} 
                onSave={(newPwd) => {
                  updateStudentData(currentUser.id, { pwd: newPwd });
                  setShowPwdModal(false);
                  showToast('비밀번호가 안전하게 변경되었습니다! 🔐');
                }} 
              />
            )}
          </div>
        );
      }

      function LoginScreen({ loginName, setLoginName, loginPwd, setLoginPwd, handleLogin, loginError }) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-cyan-200 to-blue-300 p-4 relative overflow-hidden">
            <div className="absolute top-0 right-0 w-96 h-96 bg-white/40 rounded-full blur-3xl transform translate-x-1/3 -translate-y-1/3 pointer-events-none"></div>
            <div className="absolute bottom-0 left-0 w-96 h-96 bg-cyan-400/30 rounded-full blur-3xl transform -translate-x-1/3 translate-y-1/3 pointer-events-none"></div>

            <div className="bg-white/95 backdrop-blur-md p-10 rounded-[3rem] shadow-2xl w-full max-w-md border-[6px] border-white relative z-10">
              <div className="text-center mb-10">
                <div className="w-32 h-32 mx-auto mb-6 flex items-center justify-center bg-cyan-100 rounded-full border-4 border-cyan-300 shadow-inner overflow-hidden relative">
                  <img src="https://i.postimg.cc/cLsf9TH7/padoban-sangjing.png" alt="파도반 상징" className="w-full h-full object-contain p-4 drop-shadow-sm z-10 relative" />
                  <div className="absolute bottom-0 w-full h-1/2 bg-blue-200/50"></div>
                </div>
                <h1 className="text-4xl font-black text-cyan-900 tracking-tight">파도반 로그인</h1>
                <p className="text-cyan-700 mt-2 font-bold bg-cyan-100 inline-block px-4 py-1.5 rounded-full">우리 반의 행복한 공간 🐳</p>
              </div>
              
              <form onSubmit={handleLogin} className="space-y-5">
                <div>
                  <label className="block text-sm font-black text-cyan-900 mb-2 pl-3">내 이름</label>
                  <input 
                    type="text" value={loginName} onChange={(e) => setLoginName(e.target.value)}
                    className="w-full px-6 py-4 rounded-[1.5rem] border-2 border-cyan-100 focus:outline-none focus:border-cyan-400 focus:ring-4 focus:ring-cyan-50 bg-stone-50 font-black text-lg text-stone-800 placeholder:text-stone-300 transition-all shadow-inner"
                    placeholder="이름을 입력하세요" required
                  />
                </div>
                <div>
                  <label className="block text-sm font-black text-cyan-900 mb-2 pl-3">비밀번호</label>
                  <input 
                    type="password" value={loginPwd} onChange={(e) => setLoginPwd(e.target.value)}
                    className="w-full px-6 py-4 rounded-[1.5rem] border-2 border-cyan-100 focus:outline-none focus:border-cyan-400 focus:ring-4 focus:ring-cyan-50 bg-stone-50 font-black text-lg text-stone-800 placeholder:text-stone-300 transition-all shadow-inner"
                    placeholder="비밀번호" required
                  />
                </div>
                {loginError && (
                  <div className="bg-rose-100 text-rose-700 p-3 rounded-2xl text-center font-bold text-sm border border-rose-200 animate-pulse">
                    {loginError}
                  </div>
                )}
                <button type="submit" className="w-full bg-gradient-to-r from-cyan-400 to-cyan-500 hover:from-cyan-500 hover:to-cyan-600 text-white font-black py-5 px-4 rounded-[1.5rem] shadow-xl shadow-cyan-300/50 transition-all transform hover:-translate-y-1 active:scale-95 text-xl mt-4 border-b-4 border-cyan-700/40">
                  문 열기 🚪
                </button>
              </form>
            </div>
          </div>
        );
      }

      function PasswordChangeModal({ onClose, onSave }) {
        const [pwd1, setPwd1] = useState('');
        const [pwd2, setPwd2] = useState('');
        const [errorMsg, setErrorMsg] = useState('');

        const handleSubmit = (e) => {
          e.preventDefault();
          if (!/^\d{4}$/.test(pwd1)) {
            setErrorMsg('비밀번호는 숫자 4자리로 입력해주세요. (예: 0715)');
            return;
          }
          if (pwd1 !== pwd2) {
            setErrorMsg('비밀번호가 서로 다릅니다. 다시 확인해주세요.');
            return;
          }
          onSave(pwd1);
        };

        return (
          <div className="fixed inset-0 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center z-[200] p-4">
            <div className="bg-white rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl relative border-4 border-orange-200">
              <div className="text-center mb-6">
                <span className="text-5xl drop-shadow-md block mb-3">🔐</span>
                <h3 className="font-black text-2xl text-stone-800">비밀번호 설정</h3>
                <p className="text-sm font-bold text-stone-500 mt-2 break-keep">안전한 나만의 4자리 숫자 비밀번호를 만들어주세요!</p>
              </div>

              <form onSubmit={handleSubmit} className="space-y-4">
                <div>
                  <input type="password" placeholder="새로운 4자리 숫자 입력" value={pwd1} onChange={e => setPwd1(e.target.value)} maxLength={4} className="w-full bg-orange-50 border-2 border-orange-100 rounded-2xl px-5 py-4 font-black text-center text-2xl focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-50 text-stone-800 tracking-[0.5em]" required />
                </div>
                <div>
                  <input type="password" placeholder="비밀번호 한 번 더 확인" value={pwd2} onChange={e => setPwd2(e.target.value)} maxLength={4} className="w-full bg-orange-50 border-2 border-orange-100 rounded-2xl px-5 py-4 font-black text-center text-2xl focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-50 text-stone-800 tracking-[0.5em]" required />
                </div>
                
                {errorMsg && <p className="text-rose-600 text-sm font-bold text-center bg-rose-100 p-3 rounded-xl border border-rose-200">{errorMsg}</p>}
                
                <div className="flex gap-3 mt-6">
                  <button type="button" onClick={onClose} className="flex-1 bg-stone-100 text-stone-500 font-black py-4 rounded-2xl hover:bg-stone-200 transition">나중에</button>
                  <button type="submit" className="flex-1 bg-orange-400 hover:bg-orange-500 text-white font-black py-4 rounded-2xl shadow-md transition transform hover:-translate-y-1">변경하기</button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      function TeacherDashboard({ currentUser, dbData, setDbData, updateStudentData, syncToServer, showToast, batchUpdateStudents }) {
        const [activeTab, setActiveTab] = useState('students');
        const [batchMoney, setBatchMoney] = useState('');
        const [batchExp, setBatchExp] = useState('');
        const [selectedStudentProfile, setSelectedStudentProfile] = useState(null);

        const students = dbData.Users.filter(u => u.role === 'student');

        const handleBatchReward = (type) => {
          const val = Number(type === 'money' ? batchMoney : batchExp);
          if (!val || val <= 0) return showToast('올바른 값을 입력하세요.');

          const studentIds = students.map(s => s.id);
          batchUpdateStudents(studentIds, type, val);

          if (type === 'money') setBatchMoney('');
          else setBatchExp('');
        };

        const tabs = [
            { id: 'students', label: '학급 관리', icon: '🌱' },
            { id: 'records', label: '기록 관리', icon: '📈' }, 
            { id: 'tasks', label: '할 일', icon: '📝' },
            { id: 'letters', label: '우체국', icon: '📮' }, // 💡 우체국 탭
            { id: 'emotions', label: '마음 일기', icon: '🫧' },
            { id: 'announcements', label: '알림장', icon: '📢' },

      function PostOfficeStudent({ currentUser, dbData, setDbData, syncToServer, showToast }) {
        const [activeTab, setActiveTab] = useState('received'); // received, sent, write
        const [receiverId, setReceiverId] = useState('');
        const [tag, setTag] = useState('');
        const [content, setContent] = useState('');

        const letters = Array.isArray(dbData.Letters) ? dbData.Letters : [];
        const students = Array.isArray(dbData.Users) ? dbData.Users.filter(u => u.role === 'student' && u.id !== currentUser.id) : [];

        const tags = ['칭찬해 👏', '고마워 💖', '미안해 💧', '응원해 💪', '축하해 🎉', '친해지자 🤝'];

        const receivedLetters = letters.filter(l => l.receiverId === currentUser.id && l.status === 'approved').sort((a,b) => b.id - a.id);
        const sentLetters = letters.filter(l => l.senderId === currentUser.id).sort((a,b) => b.id - a.id);

        const handleSend = (e) => {
          e.preventDefault();
          if (!receiverId || !tag || !content) return;
          const receiver = students.find(s => s.id === receiverId);
          if (!receiver) return;

          const newLetter = {
            id: Date.now().toString(),
            senderId: currentUser.id,
            senderName: currentUser.name,
            receiverId: receiver.id,
            receiverName: receiver.name,
            tag: tag,
            content: content,
            status: 'pending',
            date: new Date().toISOString().split('T')[0]
          };

          setDbData(prev => ({ ...prev, Letters: [newLetter, ...prev.Letters] }));
          syncToServer('Letters', 'INSERT', null, newLetter);
          
          setReceiverId(''); setTag(''); setContent('');
          setActiveTab('sent');
          showToast('편지를 보냈습니다! 선생님의 승인을 기다려주세요 📮');
        };

        return (
          <div className="space-y-6">
            <div className="bg-gradient-to-r from-pink-100 to-rose-100 p-8 rounded-[2.5rem] shadow-sm text-pink-900 relative overflow-hidden border border-pink-200">
              <div className="absolute -right-4 -bottom-4 text-[8rem] opacity-30">📮</div>
              <h2 className="text-3xl font-black mb-2 relative z-10">행복 이음 우체국</h2>
              <p className="font-bold opacity-90 relative z-10">친구들에게 따뜻한 마음을 전해보세요!</p>
            </div>

            <div className="flex bg-white/80 p-2 rounded-2xl shadow-sm gap-2 border border-pink-100">
              <button onClick={() => setActiveTab('received')} className={`flex-1 py-3 rounded-xl font-bold transition ${activeTab === 'received' ? 'bg-pink-400 text-white shadow-md' : 'text-stone-500 hover:bg-pink-50'}`}>받은 편지 ({receivedLetters.length})</button>
              <button onClick={() => setActiveTab('sent')} className={`flex-1 py-3 rounded-xl font-bold transition ${activeTab === 'sent' ? 'bg-pink-400 text-white shadow-md' : 'text-stone-500 hover:bg-pink-50'}`}>보낸 편지</button>
              <button onClick={() => setActiveTab('write')} className={`flex-1 py-3 rounded-xl font-bold transition ${activeTab === 'write' ? 'bg-pink-400 text-white shadow-md' : 'text-stone-500 hover:bg-pink-50'}`}>편지 쓰기 ✍️</button>
            </div>

            {activeTab === 'write' && (
              <form onSubmit={handleSend} className="bg-white/90 p-6 rounded-[2rem] shadow-sm border border-pink-100 space-y-5">
                <div>
                  <label className="block text-sm font-black text-pink-800 mb-2">누구에게 보낼까요?</label>
                  <select value={receiverId} onChange={e=>setReceiverId(e.target.value)} className="w-full bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-pink-300 font-bold text-stone-800" required>
                    <option value="">친구 선택...</option>
                    {students.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-black text-pink-800 mb-2">어떤 마음을 전할까요?</label>
                  <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
                    {tags.map(t => (
                      <button type="button" key={t} onClick={() => setTag(t)} className={`px-4 py-2 rounded-full whitespace-nowrap font-black transition border ${tag === t ? 'bg-pink-400 text-white border-pink-500 shadow-sm' : 'bg-white text-stone-500 border-stone-200 hover:bg-pink-50'}`}>
                        {t}

                </div>
                <button type="submit" className="w-full bg-pink-500 text-white font-black py-4 rounded-xl shadow-md hover:bg-pink-600 transition">편지 발송하기 📮</button>
              </form>
            )}

            {activeTab === 'received' && (
              <div className="space-y-4">
                {receivedLetters.length === 0 ? (
                  <div className="text-center py-10 text-stone-400 font-black bg-white/50 rounded-[2rem] border border-pink-50">아직 받은 편지가 없습니다.</div>
                ) : (
                  receivedLetters.map(l => (
                    <div key={l.id} className="bg-white p-6 rounded-[2rem] shadow-sm border border-pink-100 relative group overflow-hidden">

                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="bg-stone-200 text-stone-700 px-3 py-1 rounded-full text-xs font-black">{safeText(l.tag)}</span>
                          <span className="font-bold text-stone-600">To. {safeText(l.receiverName)}</span>
                        </div>
                        <span className={`text-xs font-black px-3 py-1 rounded-xl shadow-sm ${l.status === 'pending' ? 'bg-amber-100 text-amber-700 border border-amber-200' : 'bg-emerald-100 text-emerald-700 border border-emerald-200'}`}>
                          {l.status === 'pending' ? '승인 대기중 ⏳' : '발송 완료 🕊️'}
                        </span>
                      </div>
                      <p className="text-stone-500 font-bold bg-stone-50 p-4 rounded-xl line-clamp-2">{safeText(l.content)}</p>
                    </div>

                )}

      // ==========================================
      // 💡 [새 컴포넌트] 우체국 관리 (교사용)
      // ==========================================
      function PostOfficeTeacher({ dbData, setDbData, syncToServer, showToast }) {
        const [activeTab, setActiveTab] = useState('pending'); // pending, all, stats

        const letters = Array.isArray(dbData.Letters) ? dbData.Letters : [];
        const pendingLetters = letters.filter(l => l.status === 'pending').sort((a,b) => b.id - a.id);
        const approvedLetters = letters.filter(l => l.status === 'approved').sort((a,b) => b.id - a.id);

        const handleApprove = (id) => {
          setDbData(prev => ({
            ...prev,
            Letters: prev.Letters.map(l => l.id === id ? { ...l, status: 'approved' } : l)
          }));
          syncToServer('Letters', 'UPDATE', id, { status: 'approved' });
          showToast('편지가 승인되어 발송되었습니다!');
        };

        const handleReject = (id) => {
          if(!window.confirm("이 편지를 반려(삭제)하시겠습니까?")) return;
          setDbData(prev => ({
            ...prev,
            Letters: prev.Letters.filter(l => l.id !== id)
          }));
          syncToServer('Letters', 'DELETE', id, null);
          showToast('편지가 삭제되었습니다.');
        };

        // 통계 계산
        const tagStats = {};
        approvedLetters.forEach(l => {
          if(!tagStats[l.tag]) tagStats[l.tag] = 0;
          tagStats[l.tag]++;
        });
        const sortedStats = Object.entries(tagStats).sort((a,b) => b[1] - a[1]);

        return (
          <div className="space-y-6">
            <div className="bg-gradient-to-r from-pink-200 to-rose-200 p-8 rounded-[2.5rem] shadow-sm text-pink-900 relative overflow-hidden border border-pink-300">
              <div className="absolute -right-4 -bottom-4 text-[8rem] opacity-30">📮</div>
              <h2 className="text-3xl font-black mb-2 relative z-10">우체국 관리</h2>
              <p className="font-bold opacity-90 relative z-10">학생들의 편지를 검수하고 우리 반의 소통 온도를 확인하세요.</p>
            </div>

            <div className="flex bg-white/80 p-2 rounded-2xl shadow-sm gap-2 border border-pink-100">
              <button onClick={() => setActiveTab('pending')} className={`flex-1 py-3 rounded-xl font-bold transition ${activeTab === 'pending' ? 'bg-pink-400 text-white shadow-md' : 'text-stone-500 hover:bg-pink-50'}`}>
                승인 대기 ({pendingLetters.length})
              </button>
              <button onClick={() => setActiveTab('all')} className={`flex-1 py-3 rounded-xl font-bold transition ${activeTab === 'all' ? 'bg-pink-400 text-white shadow-md' : 'text-stone-500 hover:bg-pink-50'}`}>
                전체 편지함
              </button>
              <button onClick={() => setActiveTab('stats')} className={`flex-1 py-3 rounded-xl font-bold transition ${activeTab === 'stats' ? 'bg-pink-400 text-white shadow-md' : 'text-stone-500 hover:bg-pink-50'}`}>
                연구 통계 📊
              </button>
            </div>

            {activeTab === 'pending' && (
              <div className="space-y-4">
                {pendingLetters.length === 0 ? (
                  <div className="text-center py-10 text-stone-400 font-black bg-white/50 rounded-[2rem] border border-pink-50">대기중인 편지가 없습니다.</div>
                ) : (
                  pendingLetters.map(l => (
                    <div key={l.id} className="bg-white p-6 rounded-[2rem] shadow-sm border border-pink-200">
                      <div className="flex justify-between items-center mb-4 border-b border-stone-100 pb-3">
                        <div className="flex items-center flex-wrap gap-2">
                          <span className="font-black text-lg text-stone-800">{safeText(l.senderName)}</span>
                          <span className="text-stone-400 font-bold">👉</span>
                          <span className="font-black text-lg text-stone-800">{safeText(l.receiverName)}</span>
                        </div>
                        <span className="bg-pink-100 text-pink-800 px-3 py-1 rounded-full text-xs font-black">{safeText(l.tag)}</span>
                      </div>
                      <p className="text-stone-700 font-bold bg-stone-50 p-5 rounded-2xl mb-4 leading-relaxed whitespace-pre-wrap">{safeText(l.content)}</p>
                      <div className="flex gap-3 mt-4">
                        <button onClick={() => handleApprove(l.id)} className="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-xl transition shadow-sm border border-emerald-600">승인 (발송)</button>
                        <button onClick={() => handleReject(l.id)} className="flex-1 bg-rose-400 hover:bg-rose-500 text-white font-black py-4 rounded-xl transition shadow-sm border border-rose-500">반려 (삭제)</button>
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}

            {activeTab === 'all' && (

      function RecordManagerTeacher({ dbData, setDbData, syncToServer, showToast, students }) {
        const [newCategoryName, setNewCategoryName] = useState('');
        
        const [selectedStudentId, setSelectedStudentId] = useState('');
        const [selectedCategory, setSelectedCategory] = useState('');
        const [recordDate, setRecordDate] = useState(new Date().toISOString().split('T')[0]);
        const [recordPeriod, setRecordPeriod] = useState('1교시');
        const [recordScore, setRecordScore] = useState('');
        const [recordComment, setRecordComment] = useState('');

        const categories = Array.isArray(dbData.RecordCategories) ? dbData.RecordCategories : [];
        const records = Array.isArray(dbData.Records) ? dbData.Records : [];

        const handleAddCategory = (e) => {
          e.preventDefault();
          if (!newCategoryName.trim()) return;
          const newCat = { id: Date.now().toString(), name: newCategoryName.trim() };
          setDbData(prev => ({ ...prev, RecordCategories: [...(prev.RecordCategories || []), newCat] }));
          syncToServer('RecordCategories', 'INSERT', null, newCat);
          setNewCategoryName('');
          showToast(`과목/분야 '${newCat.name}'가 추가되었습니다.`);
        };

        const handleDeleteCategory = (id) => {
          if (!confirm("이 과목을 삭제하시겠습니까?")) return;
          setDbData(prev => ({ ...prev, RecordCategories: prev.RecordCategories.filter(c => c.id !== id) }));
          syncToServer('RecordCategories', 'DELETE', id, null);
          showToast('과목/분야가 삭제되었습니다.');
        };

        const handleAddRecord = (e) => {
          e.preventDefault();
          if (!selectedStudentId || !selectedCategory || !recordDate || !recordScore) {
            showToast('필수 항목을 모두 입력해주세요.');
            return;

          const student = students.find(s => s.id === selectedStudentId);
          const newRecord = {
            id: Date.now().toString(),
            studentId: selectedStudentId,
            studentName: student.name,
            category: selectedCategory,
            date: recordDate,
            period: recordPeriod,
            score: recordScore,
            comment: recordComment
          };

          setDbData(prev => ({ ...prev, Records: [newRecord, ...(prev.Records || [])] }));
          syncToServer('Records', 'INSERT', null, newRecord);
          
          setRecordScore('');
          setRecordComment('');
          showToast(`${student.name} 학생의 기록이 저장되었습니다!`);

        const handleDeleteRecord = (id) => {
          if (!confirm("이 기록을 삭제하시겠습니까?")) return;
          setDbData(prev => ({ ...prev, Records: prev.Records.filter(r => r.id !== id) }));
          syncToServer('Records', 'DELETE', id, null);
          showToast('기록이 삭제되었습니다.');
        };

        return (

            <div className="bg-gradient-to-r from-blue-200 to-indigo-200 p-8 rounded-[2.5rem] shadow-sm text-blue-900 relative overflow-hidden">
              <div className="absolute -right-4 -bottom-4 text-[8rem] opacity-30">📈</div>
              <h2 className="text-3xl font-black mb-2 relative z-10">학생 기록 관리</h2>
              <p className="font-bold opacity-90 relative z-10">시험 성적, 활동 결과 등을 누적해서 기록해주세요.</p>
            </div>

            <div className="bg-white/90 p-6 rounded-[2rem] shadow-sm border border-blue-100 space-y-4">
              <h3 className="font-black text-lg text-blue-900">📚 과목 및 분야 관리</h3>
              <form onSubmit={handleAddCategory} className="flex gap-2">
                <input type="text" placeholder="새 과목/분야 추가 (예: 국어, 단원평가)" value={newCategoryName} onChange={e=>setNewCategoryName(e.target.value)} className="flex-1 bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300 font-bold" required />
                <button type="submit" className="bg-blue-500 hover:bg-blue-600 text-white font-black px-6 rounded-xl shadow-sm transition">추가</button>
              </form>
              <div className="flex flex-wrap gap-2 mt-4">
                {categories.map(cat => (
                  <div key={cat.id} className="flex items-center gap-2 bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100">
                    <span className="text-sm font-bold text-blue-800">{safeText(cat.name)}</span>
                    <button onClick={() => handleDeleteCategory(cat.id)} className="text-blue-300 hover:text-rose-500 font-black text-xs">✕</button>
                  </div>
                ))}
              </div>
            </div>

            <form onSubmit={handleAddRecord} className="bg-white/90 p-6 rounded-[2rem] shadow-sm border border-indigo-100 space-y-4">
              <h3 className="font-black text-lg text-indigo-900">✏️ 새로운 기록 추가</h3>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select value={selectedStudentId} onChange={e=>setSelectedStudentId(e.target.value)} className="w-full bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800" required>
                  <option value="">👤 학생 선택...</option>
                  {students.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
                
                <select value={selectedCategory} onChange={e=>setSelectedCategory(e.target.value)} className="w-full bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800" required>
                  <option value="">📚 과목/분야 선택...</option>
                  {categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}

                <div className="flex gap-2">

                  <input type="text" placeholder="예: 1교시" value={recordPeriod} onChange={e=>setRecordPeriod(e.target.value)} className="w-24 bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800 text-center" />
                </div>
                
                <input type="text" placeholder="점수 또는 결과 (예: 95점, 우수)" value={recordScore} onChange={e=>setRecordScore(e.target.value)} className="w-full bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800" required />
              </div>
              
              <textarea placeholder="선생님의 코멘트를 적어주세요. (선택사항)" value={recordComment} onChange={e=>setRecordComment(e.target.value)} rows="2" className="w-full bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800 resize-none" />
              
              <button type="submit" className="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-black py-4 rounded-xl shadow-md transition">학생 기록 저장하기</button>
            </form>

            <div className="space-y-4">
              <h3 className="font-black text-lg text-stone-800 ml-2">📋 최근 등록된 기록</h3>
              {records.length === 0 ? (
                <div className="text-center py-10 text-stone-400 font-black bg-white/50 rounded-[2rem]">아직 등록된 기록이 없습니다.</div>
              ) : (
                records.map(record => (
                  <div key={record.id} className="bg-white/95 p-5 rounded-[2rem] shadow-sm border border-stone-200 flex flex-col md:flex-row gap-4 items-center justify-between group">
                    <div className="flex-1 w-full">
                      <div className="flex items-center gap-2 mb-2">
                        <span className="bg-blue-100 text-blue-800 font-black px-3 py-1 rounded-full text-xs">{safeText(record.category)}</span>
                        <span className="font-black text-lg text-stone-800">{safeText(record.studentName)}</span>
                        <span className="text-xs font-bold text-stone-400 ml-auto md:ml-0">{safeText(record.date)} ({safeText(record.period)})</span>
                      </div>
                      <div className="flex items-baseline gap-4 mt-2">
                        <span className="text-2xl font-black text-indigo-600">{safeText(record.score)}</span>
                        {record.comment && <span className="text-sm font-bold text-stone-600 italic bg-stone-50 px-3 py-1.5 rounded-xl flex-1">"{safeText(record.comment)}"</span>}
                      </div>
                    </div>
                    <button onClick={() => handleDeleteRecord(record.id)} className="bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white p-3 rounded-xl font-black transition opacity-100 md:opacity-0 md:group-hover:opacity-100 shrink-0">삭제</button>
                  </div>
                ))
              )}
            </div>
          </div>
        );
      }

                      {record.comment && (

      function PurchaseLogManager({ dbData }) {
        const logs = Array.isArray(dbData.PurchaseLogs) ? dbData.PurchaseLogs : [];

        const groupedLogs = logs.reduce((acc, log) => {
          const fullDate = log.date || '';
          const date = fullDate.includes('T') ? fullDate.split('T')[0] : (fullDate || '날짜 없음');
          if (!acc[date]) acc[date] = [];
          acc[date].push(log);
          return acc;
        }, {});

        const dates = Object.keys(groupedLogs).sort((a, b) => new Date(b) - new Date(a)); 

        return (
          <div className="space-y-8">
            <div className="bg-emerald-100 p-8 rounded-[2.5rem] shadow-sm text-emerald-900 relative overflow-hidden border border-emerald-200">
              <div className="absolute -right-4 -bottom-4 text-[8rem] opacity-30">🛒</div>
              <h2 className="text-3xl font-black mb-2 relative z-10">상점 구매 내역</h2>
              <p className="font-bold opacity-90 relative z-10">학생들이 언제 어떤 아이템을 샀는지 일목요연하게 확인하세요!</p>
            </div>

            {dates.length === 0 ? (
              <div className="text-center py-16 text-emerald-600 bg-white/50 rounded-[2.5rem] font-bold border border-emerald-100">아직 상점에서 구매한 내역이 없습니다.</div>
            ) : (
              <div className="space-y-6">
                {dates.map(date => (
                  <div key={date} className="bg-white/95 p-6 rounded-[2rem] shadow-sm border border-stone-200">
                    <h3 className="font-black text-xl text-emerald-800 mb-4 flex items-center gap-2">📅 {date}</h3>
                    <div className="space-y-3">
                      {groupedLogs[date].map((log, idx) => (
                        <div key={log.id || idx} className="flex flex-col sm:flex-row justify-between sm:items-center bg-stone-50 p-4 rounded-2xl border border-stone-100 gap-2">
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="font-black text-lg text-stone-800">{safeText(log.studentName)}</span>
                            <span className="text-sm font-bold text-stone-500">학생이</span>
                            <span className="font-black text-purple-600 bg-purple-100 px-3 py-1.5 rounded-full shadow-sm">{safeText(log.itemName)}</span>
                            <span className="text-sm font-bold text-stone-500">을(를) 구매했습니다.</span>
                          </div>
                          <div className="font-black text-amber-600 whitespace-nowrap sm:text-right">
                            - 🪙 {log.price}원
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      function Shop({ currentUser, dbData, setDbData, updateStudentData, syncToServer, showToast }) {
        const [showUpload, setShowUpload] = useState(false);
        const [newItemName, setNewItemName] = useState('');
        const [newItemIcon, setNewItemIcon] = useState('🍎');
        const shopItems = Array.isArray(dbData.ShopItems) ? dbData.ShopItems : [];
        const ownedItems = Array.isArray(currentUser.ownedItems) ? currentUser.ownedItems : [];

        const handleBuy = (item) => {
          if (ownedItems.some(id => String(id) === String(item.id))) return showToast('이미 가진 아이템이에요!');
          if (currentUser.money < item.price) return showToast('돈이 부족해요!');
          
          updateStudentData(currentUser.id, { money: Number(currentUser.money || 0) - item.price, ownedItems: [...ownedItems, item.id] });
          
          const newLog = {
            id: Date.now().toString(),
            studentName: currentUser.name,
            itemName: item.name,
            price: item.price,
            date: new Date().toISOString()
          };

          setDbData(prev => ({ ...prev, PurchaseLogs: [newLog, ...(prev.PurchaseLogs || [])] }));
          syncToServer('PurchaseLogs', 'INSERT', null, newLog);

          showToast(`${item.name} 구매 완료! 🛍️`);
        };

        const handleUploadSubmit = (e) => {
          e.preventDefault();
          if(!newItemName) return;
          const newPending = { id: Date.now().toString(), studentName: currentUser.name, itemName: newItemName, icon: newItemIcon, type: 'head' };
          setDbData(prev => ({ ...prev, PendingItems: [...(prev.PendingItems || []), newPending] }));
          syncToServer('PendingItems', 'INSERT', null, newPending);
          setShowUpload(false); setNewItemName(''); setNewItemIcon('🍎');
          showToast('선생님께 제안을 보냈어요!');
        };

        return (
          <div className="space-y-6">
            <div className="flex justify-between items-center bg-white/80 p-5 rounded-[2rem] border border-amber-100 shadow-sm">
              <div className="font-black text-amber-800 text-lg">내 지갑</div>
              <div className="text-2xl font-black text-amber-600 bg-amber-50 border border-amber-200 px-4 py-2 rounded-2xl">🪙 {currentUser.money}</div>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
              {shopItems.map((item, idx) => {
                if (!item || !item.id) return null;
                const isOwned = ownedItems.some(id => String(id) === String(item.id));
                return (
                  <div key={item.id || idx} className="bg-white/95 rounded-[2rem] p-5 shadow-sm border border-stone-200 text-center flex flex-col hover:border-sky-300 transition-colors">
                    <div className="w-20 h-20 mb-4 mx-auto flex items-center justify-center bg-stone-100 rounded-3xl border border-stone-200 shadow-inner">
                      {isImageUrl(item.icon) ? <img src={item.icon} alt={item.name} className="w-full h-full object-contain p-2" /> : <span className="text-5xl drop-shadow-md">{safeText(item.icon)}</span>}
                    </div>
                    <div className="font-black text-slate-800 mb-1">{safeText(item.name)}</div>
                    <div className="text-sky-700 font-black mb-4">{item.price} 원</div>
                    <div className="mt-auto">
                      <button onClick={() => handleBuy(item)} disabled={isOwned} className={`w-full py-3 rounded-xl text-sm font-black transition-all ${isOwned ? 'bg-slate-100 text-slate-400 border border-slate-200' : 'bg-sky-400 text-white border border-sky-500 shadow-md hover:bg-sky-500 hover:-translate-y-1'}`}>
                        {isOwned ? '보유중' : '구매하기'}
                      </button>
                    </div>
                  </div>
                )
              })}
            </div>
            <div className="mt-8">
              <button onClick={() => setShowUpload(!showUpload)} className="w-full bg-white/80 text-sky-700 font-black py-5 rounded-[2rem] shadow-sm border border-sky-200 hover:bg-sky-50 transition">
                📤 아이템 제안하기
              </button>
              {showUpload && (
                <form onSubmit={handleUploadSubmit} className="mt-4 bg-white/95 p-6 rounded-[2rem] shadow-sm border border-sky-200 space-y-4">
                  <div className="flex gap-4">
                    <input type="text" value={newItemIcon} onChange={e=>setNewItemIcon(e.target.value)} className="w-1/4 text-center text-2xl p-3 bg-white border border-sky-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-400 font-bold" placeholder="이모지/URL" required />
                    <input type="text" value={newItemName} onChange={e=>setNewItemName(e.target.value)} className="w-3/4 p-3 bg-white border border-sky-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-400 font-bold text-stone-800" placeholder="아이템 이름" required />
                  </div>
                  <button type="submit" className="w-full bg-sky-600 hover:bg-sky-700 border border-sky-700 text-white font-black py-4 rounded-xl shadow-md transition">선생님께 보내기</button>
                </form>
              )}
            </div>
          </div>
        );
      }

      function StudentManagerCard({ student, updateStudentData, showToast, shopItems, onOpenProfile }) {
        const [expAmount, setExpAmount] = useState('');
        const [moneyAmount, setMoneyAmount] = useState('');
        const [newTitle, setNewTitle] = useState('');
        const [selectedItemToGive, setSelectedItemToGive] = useState('');

        const equippedItems = Array.isArray(student.equippedItems) ? student.equippedItems : [];
        const safeShopItems = Array.isArray(shopItems) ? shopItems : [];
        const equippedIcons = equippedItems.map(id => safeShopItems.find(i => String(i.id) === String(id))?.icon).filter(Boolean);
        
        const handleGiveItem = () => {
          if(!selectedItemToGive) return showToast('아이템을 선택하세요.');
          const owned = Array.isArray(student.ownedItems) ? student.ownedItems : [];
          if(owned.some(id => String(id) === String(selectedItemToGive))) return showToast('이미 가진 아이템입니다.');
          updateStudentData(student.id, { ownedItems: [...owned, selectedItemToGive] });
          showToast(`${student.name}에게 선물을 주었습니다!`);
          setSelectedItemToGive('');
        };

        const handleGiveTitle = () => {
          if(!newTitle.trim()) return showToast('칭호를 입력하세요.');
          const currentTitles = Array.isArray(student.ownedTitles) ? student.ownedTitles : [];
          if(currentTitles.includes(newTitle)) return showToast('이미 가진 칭호입니다.');
          updateStudentData(student.id, { ownedTitles: [...currentTitles, newTitle], title: newTitle });
          showToast(`${student.name}에게 새 칭호를 주었습니다!`);
          setNewTitle('');
        };

        return (
          <div className="bg-white/95 p-6 rounded-[2rem] shadow-sm border border-stone-100 flex flex-col gap-5 hover:border-orange-200 transition-colors">
            <div className="flex justify-between items-center border-b border-stone-50 pb-4">
              <div className="flex items-center gap-4">
                <div className="relative w-16 h-16 bg-orange-50 rounded-full flex items-center justify-center border-4 border-white shadow-inner overflow-hidden cursor-pointer" onClick={onOpenProfile}>
                   {equippedIcons.length === 0 ? (
                      student.faceUrl ? ( <img src={student.faceUrl} alt="프로필" className="w-full h-full object-cover" /> ) : ( <span className="text-3xl text-orange-200">👦</span> )
                   ) : (
                      <div className="absolute inset-0 flex items-center justify-center drop-shadow-md bg-white">
                        {equippedIcons.map((icon, idx) => (
                          isImageUrl(icon) ? <img key={idx} src={icon} alt="장착" className="absolute w-12 h-12 object-contain" /> : <span key={idx} className="absolute text-3xl">{safeText(icon)}</span>
                        ))}
                      </div>
                   )}
                </div>
                <div>
                  <div className="flex items-center gap-2 mb-1">
                    <button onClick={onOpenProfile} className="font-black text-xl text-stone-800 hover:text-orange-500 transition-colors">{safeText(student.name)}</button>
                  </div>
                  <div className="text-xs font-bold text-orange-700 bg-orange-100 px-3 py-1 rounded-full inline-block">{safeText(student.title) || '새싹 파도'}</div>
                </div>
              </div>
              <div className="text-right">
                <div className="font-black text-sky-600 text-lg">Lv.{student.level}</div>
                <div className="text-xs font-bold text-stone-400 mt-1">⭐ {student.exp} | 🪙 {student.money}</div>
              </div>
            </div>

            <div className="space-y-3">
              <div className="flex gap-2">
                <input type="number" placeholder="경험치 (예:10)" value={expAmount} onChange={e => setExpAmount(e.target.value)} className="flex-1 bg-stone-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-sky-300 font-bold text-stone-800" />
                <button onClick={() => { updateStudentData(student.id, { exp: Number(student.exp) + Number(expAmount) }); showToast(`${student.name} EXP 지급!`); setExpAmount(''); }} className="bg-sky-400 hover:bg-sky-500 text-white font-bold px-4 py-3 rounded-xl text-sm shadow-sm shrink-0 whitespace-nowrap transition">EXP 지급</button>
              </div>
              <div className="flex gap-2">
                <input type="number" placeholder="용돈 (예:100)" value={moneyAmount} onChange={e => setMoneyAmount(e.target.value)} className="flex-1 bg-stone-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-amber-300 font-bold text-stone-800" />
                <button onClick={() => { updateStudentData(student.id, { money: Number(student.money) + Number(moneyAmount) }); showToast(`${student.name} 용돈 지급!`); setMoneyAmount(''); }} className="bg-amber-400 hover:bg-amber-500 text-white font-bold px-4 py-3 rounded-xl text-sm shadow-sm shrink-0 whitespace-nowrap transition">용돈 지급</button>
              </div>
              <div className="flex gap-2">
                <input type="text" placeholder="새로운 칭호 하사하기" value={newTitle} onChange={e => setNewTitle(e.target.value)} className="flex-1 bg-stone-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-orange-300 font-bold text-stone-800" />
                <button onClick={handleGiveTitle} className="bg-orange-400 hover:bg-orange-500 text-white font-bold px-4 py-3 rounded-xl text-sm shadow-sm shrink-0 whitespace-nowrap transition">칭호 부여</button>
              </div>
              <div className="flex gap-2">
                <select value={selectedItemToGive} onChange={e => setSelectedItemToGive(e.target.value)} className="flex-1 bg-stone-50 border-none rounded-xl px-3 py-3 text-sm focus:ring-2 focus:ring-purple-300 font-bold outline-none text-stone-800">
                  <option value="">🎁 상점 아이템 선물하기...</option>
                  {safeShopItems.map(item => <option key={item.id} value={item.id}>{item.name}</option>)}
                </select>
                <button onClick={handleGiveItem} className="bg-purple-400 hover:bg-purple-500 text-white font-bold px-4 py-3 rounded-xl text-sm shadow-sm shrink-0 whitespace-nowrap transition">선물하기</button>
              </div>
            </div>
          </div>
        );
      }

      function ShopManagerTeacher({ dbData, setDbData, syncToServer, showToast }) {
        const [itemName, setItemName] = useState('');
        const [itemIcon, setItemIcon] = useState('');
        const [itemPrice, setItemPrice] = useState('');

        const handleAdd = (e) => {
          e.preventDefault();
          if (!itemName || !itemIcon || !itemPrice) return;
          const newItem = { id: Date.now().toString(), name: itemName, icon: itemIcon, price: Number(itemPrice), type: 'head' };
          setDbData(prev => ({ ...prev, ShopItems: [...prev.ShopItems, newItem] }));
          syncToServer('ShopItems', 'INSERT', null, newItem);
          setItemName(''); setItemIcon(''); setItemPrice('');
          showToast('상점 아이템이 추가되었습니다!');
        };

        const handleDelete = (id) => {
          if(!window.confirm("정말 이 아이템을 상점에서 삭제할까요?")) return;
          setDbData(prev => ({ ...prev, ShopItems: prev.ShopItems.filter(i => i.id !== id) }));
          syncToServer('ShopItems', 'DELETE', id, null);
          showToast('아이템이 삭제되었습니다.');
        };

        return (
          <div className="space-y-6">
            <form onSubmit={handleAdd} className="bg-white/90 p-6 rounded-[2rem] shadow-sm border border-orange-100 space-y-4">
              <h3 className="font-black text-xl text-orange-900 mb-2">🏪 새로운 상점 아이템 등록</h3>
              <div className="flex flex-col md:flex-row gap-4">
                <input type="text" placeholder="이모지 또는 이미지 URL" value={itemIcon} onChange={e=>setItemIcon(e.target.value)} className="w-full md:w-1/3 bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-orange-300 font-bold text-stone-800 shadow-inner" required />
                <input type="text" placeholder="아이템 이름" value={itemName} onChange={e=>setItemName(e.target.value)} className="w-full md:w-1/3 bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-orange-300 font-bold text-stone-800 shadow-inner" required />
                <input type="number" placeholder="가격 (예: 500)" value={itemPrice} onChange={e=>setItemPrice(e.target.value)} className="w-full md:w-1/3 bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-orange-300 font-bold text-stone-800 shadow-inner" required />
              </div>
              <button type="submit" className="w-full bg-orange-400 hover:bg-orange-500 text-white font-black py-4 rounded-xl shadow-md transition border border-orange-500">아이템 등록하기</button>
            </form>

            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
              {dbData.ShopItems.map((item) => (
                <div key={item.id} className="bg-white/95 rounded-[2rem] p-5 shadow-sm border border-stone-100 text-center flex flex-col relative group">
                  <button onClick={() => handleDelete(item.id)} className="absolute top-2 right-2 bg-rose-100 text-rose-600 hover:bg-rose-500 hover:text-white rounded-full w-8 h-8 flex items-center justify-center font-bold transition">✕</button>
                  <div className="w-16 h-16 mb-3 mx-auto flex items-center justify-center bg-stone-50 rounded-2xl border border-stone-100">
                    {isImageUrl(item.icon) ? <img src={item.icon} alt={item.name} className="w-full h-full object-contain p-2" /> : <span className="text-4xl">{safeText(item.icon)}</span>}
                  </div>
                  <div className="font-black text-stone-800 mb-1">{safeText(item.name)}</div>
                  <div className="text-sky-600 font-black">{item.price} 원</div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // 렌더링
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
