<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 파도반</title>
    <!-- Tailwind CSS (디자인) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (기능) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (코드 번역기) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
      body, html { margin: 0; padding: 0; min-height: 100vh; background-color: #FFFDF8; }
      #root { min-height: 100vh; }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
      /* 부드러운 스크롤 바 */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #fed7aa; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #fdba74; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // ==========================================
      // 💡 [선생님, 주목!] 아래 주소를 반드시 선생님의 앱스스크립트 주소로 바꿔주세요!
      // ==========================================
      // 배포 관리 -> '웹 앱' 형태의 주소 (끝이 /exec 로 끝나는 주소)를 복사해서 따옴표 사이에 넣고, 끝에 ?api=true 를 꼭 붙이세요!
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzev5JeOhBVHDe1Uy6EIFSEOH_BEP2YTncgLjrQB4kRIWc-hCk3uv0hbrcdoiHjAMIj/exec?api=true'; 
      const EXP_PER_LEVEL = 100;

      // 데이터 파싱 헬퍼 함수
      const safeText = (val) => {
        if (val === null || val === undefined) return '';
        if (typeof val === 'object') return JSON.stringify(val);
        return String(val);
      };

      const isImageUrl = (str) => {
        if (!str || typeof str !== 'string') return false;
        return str.startsWith('http://') || str.startsWith('https://') || str.startsWith('data:image/');
      };

      const ColorizeText = ({ text }) => {
        if (!text) return <span className="text-slate-500 text-xs">정보 없음</span>;
        return (
          <div className="flex gap-[1px] tracking-widest text-lg">
            {String(text).split('').map((char, idx) => {
              if (/[a-zA-Z]/.test(char)) {
                return <span key={idx} className="text-blue-600 font-black">{char}</span>; 
              } else if (/[0-9]/.test(char)) {
                return <span key={idx} className="text-rose-600 font-black">{char}</span>; 
              }
              return <span key={idx} className="text-slate-700 font-bold">{char}</span>; 
            })}
          </div>
        );
      };

      function App() {
        const [loading, setLoading] = useState(true);
        const [syncing, setSyncing] = useState(false);
        const [currentUser, setCurrentUser] = useState(null);
        const [missingDbSheets, setMissingDbSheets] = useState([]);
        const [toastMsg, setToastMsg] = useState('');
        
        const [showPwdModal, setShowPwdModal] = useState(false);

        const [dbData, setDbData] = useState({
          Users: [], Announcements: [], ShopItems: [], PendingItems: [], Emotions: [], HallOfFame: [], Tasks: []
        });

        const [loginName, setLoginName] = useState('');
        const [loginPwd, setLoginPwd] = useState('');
        const [loginError, setLoginError] = useState('');

        const showToast = (msg) => {
          setToastMsg(msg);
          setTimeout(() => setToastMsg(''), 3000);
        };

        const fetchData = async () => {
          setLoading(true);
          try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            
            const requiredSheets = ['Users', 'Announcements', 'ShopItems', 'PendingItems', 'Emotions', 'HallOfFame', 'Tasks'];
            const missingSheets = requiredSheets.filter(sheet => !data[sheet]);
            
            if (missingSheets.length > 0) {
              setMissingDbSheets(missingSheets);
              showToast(`⚠️ 시트 누락: [ ${missingSheets.join(', ')} ]`);
            } else {
              setMissingDbSheets([]);
            }

            const safeParseArray = (val) => {
              if (!val) return [];
              if (typeof val === 'number') return [val]; 
              if (typeof val === 'string') {
                try { 
                  const parsed = JSON.parse(val); 
                  return Array.isArray(parsed) ? parsed : [];
                } catch(e) { return []; }
              }
              if (Array.isArray(val)) return val;
              return [];
            };

            const parsedUsers = (Array.isArray(data.Users) ? data.Users : []).map(u => ({
              ...u,
              role: u.name === '윤은철' ? 'teacher' : 'student',
              ownedItems: safeParseArray(u.ownedItems),
              equippedItems: safeParseArray(u.equippedItems),
              ownedTitles: safeParseArray(u.ownedTitles),
              intro: safeText(u.intro),
              faceUrl: safeText(u.faceUrl), 
              imoduId: safeText(u.imoduId), 
              imoduPwd: safeText(u.imoduPwd) 
            }));

            const parsedTasks = (Array.isArray(data.Tasks) ? data.Tasks : []).map(t => ({
              ...t,
              submittedUsers: safeParseArray(t.submittedUsers),
              approvedUsers: safeParseArray(t.approvedUsers)
            }));
            
            const parsedEmotions = (Array.isArray(data.Emotions) ? data.Emotions : []).map(e => ({
              ...e,
              likes: safeParseArray(e.likes)
            }));

            setDbData({
              ...data,
              Users: parsedUsers,
              Announcements: Array.isArray(data.Announcements) ? data.Announcements : [],
              ShopItems: Array.isArray(data.ShopItems) ? data.ShopItems : [],
              PendingItems: Array.isArray(data.PendingItems) ? data.PendingItems : [],
              Emotions: parsedEmotions,
              HallOfFame: Array.isArray(data.HallOfFame) ? data.HallOfFame : [],
              Tasks: parsedTasks
            });
          } catch (error) {
            console.error("Data Fetch Error:", error);
            if (error.message.includes("Failed to fetch") || error.name === "TypeError") {
              setMissingDbSheets(["(앱스스크립트 접속 권한 거부됨)"]);
              showToast("🚨 연결 실패! SCRIPT_URL이나 앱스스크립트 권한을 확인해주세요.");
            } else {
              showToast("데이터를 불러오는데 실패했습니다.");
            }
          } finally {
            setLoading(false);
          }
        };

        useEffect(() => { fetchData(); }, []);

        const syncToServer = async (sheetName, action, id, updateData) => {
          setSyncing(true);
          try {
            const res = await fetch(SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ sheetName, action, id, data: updateData })
            });
            const result = await res.json();
            if (result.success === false) alert(`저장 실패: ${result.error}`);
          } catch (error) {
            console.error("Sync Error:", error);
            alert("데이터를 저장하지 못했습니다. (네트워크 오류)");
          } finally {
            setSyncing(false);
          }
        };

        const handleLogin = (e) => {
          e.preventDefault();
          const user = dbData.Users.find(u => String(u.name).trim() === String(loginName).trim() && String(u.pwd).trim() === String(loginPwd).trim());
          
          if (user) {
            setCurrentUser(user);
            setLoginError('');
            showToast(`환영합니다, ${user.name}님! 🌊`);

            const pwdStr = String(user.pwd).trim();
            if (user.role === 'student') {
              if (!/^\d{4}$/.test(pwdStr) || ['1234', '1111', '0000'].includes(pwdStr)) {
                setShowPwdModal(true);
              }
            }
          } else {
            setLoginError('이름이나 비밀번호가 틀렸습니다.');
          }
        };

        const updateStudentData = (studentId, updates) => {
          let updatedStudent = null;
          setDbData(prev => {
            const newUsers = prev.Users.map(s => {
              if (s.id === studentId) {
                updatedStudent = { ...s, ...updates };
                if (updates.exp !== undefined) {
                  updatedStudent.level = Math.floor(updates.exp / EXP_PER_LEVEL) + 1;
                }
                if (currentUser && currentUser.id === studentId) setCurrentUser(updatedStudent);
                return updatedStudent;
              }
              return s;
            });
            return { ...prev, Users: newUsers };
          });

          if (updatedStudent) {
            const dataToSync = {
              exp: updatedStudent.exp,
              level: updatedStudent.level,
              money: updatedStudent.money,
              title: updatedStudent.title,
              ownedItems: updatedStudent.ownedItems,
              equippedItems: updatedStudent.equippedItems,
              ownedTitles: updatedStudent.ownedTitles,
              intro: updatedStudent.intro,
              faceUrl: updatedStudent.faceUrl 
            };
            if (updates.pwd !== undefined) dataToSync.pwd = updates.pwd;
            
            syncToServer('Users', 'UPDATE', studentId, dataToSync);
          }
        };

        if (loading) {
          return (
            <div className="min-h-screen bg-[#FFFDF8] flex flex-col items-center justify-center space-y-4">
              <div className="text-6xl animate-bounce mb-4 drop-shadow-md">🌊</div>
              <p className="text-sky-800 font-bold text-lg">파도반 데이터를 불러오는 중...</p>
            </div>
          );
        }

        if (!currentUser) {
          return <LoginScreen loginName={loginName} setLoginName={setLoginName} loginPwd={loginPwd} setLoginPwd={setLoginPwd} handleLogin={handleLogin} loginError={loginError} />;
        }

        return (
          <div className="min-h-screen bg-[#FFFDF8] text-stone-800 font-sans pb-24 md:pb-0 relative selection:bg-orange-200">
            {toastMsg && (
              <div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-stone-800/90 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-2xl z-50 font-bold flex items-center gap-2 animate-bounce">
                🫧 {toastMsg}
              </div>
            )}
            
            <header className="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-10 border-b border-orange-100">
              <div className="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
                <h1 className="text-2xl font-black text-sky-600 flex items-center gap-2">
                  🌊 파도반
                </h1>
                <div className="flex items-center gap-4">
                  {syncing && <span className="animate-spin inline-block text-orange-400">🔄</span>}
                  <span className="font-bold text-orange-900 bg-orange-100 px-3 py-1.5 rounded-full text-sm">{safeText(currentUser.name)} {currentUser.role === 'teacher' ? '선생님' : '학생'}</span>
                  <button onClick={() => setCurrentUser(null)} className="p-2 text-2xl hover:scale-110 transition drop-shadow-sm" title="로그아웃">🚪</button>
                </div>
              </div>
            </header>

            {missingDbSheets.length > 0 && (
              <div className="max-w-5xl mx-auto p-4 mt-4 mx-4 bg-rose-100 text-rose-800 rounded-3xl border border-rose-300 shadow-sm">
                <h3 className="font-bold text-lg mb-1">🚨 구글 연결 오류</h3>
                <p className="text-sm mb-2">스프레드시트 데이터를 가져오지 못했습니다. SCRIPT_URL 설정을 확인하세요.</p>
              </div>
            )}

            <main className="max-w-5xl mx-auto p-4 mt-4">
              {currentUser.role === 'teacher' ? (
                <TeacherDashboard currentUser={currentUser} dbData={dbData} setDbData={setDbData} updateStudentData={updateStudentData} syncToServer={syncToServer} showToast={showToast} />
              ) : (
                <StudentDashboard currentUser={currentUser} dbData={dbData} setDbData={setDbData} updateStudentData={updateStudentData} syncToServer={syncToServer} showToast={showToast} onOpenPwdModal={() => setShowPwdModal(true)} />
              )}
            </main>

            {showPwdModal && (
              <PasswordChangeModal 
                onClose={() => setShowPwdModal(false)} 
                onSave={(newPwd) => {
                  updateStudentData(currentUser.id, { pwd: newPwd });
                  setShowPwdModal(false);
                  showToast('비밀번호가 안전하게 변경되었습니다! 🔐');
                }} 
              />
            )}
          </div>
        );
      }

      function LoginScreen({ loginName, setLoginName, loginPwd, setLoginPwd, handleLogin, loginError }) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-orange-100 to-sky-200 p-4 relative overflow-hidden">
            <div className="absolute top-0 right-0 w-96 h-96 bg-white/40 rounded-full blur-3xl transform translate-x-1/3 -translate-y-1/3 pointer-events-none"></div>
            <div className="absolute bottom-0 left-0 w-96 h-96 bg-orange-300/20 rounded-full blur-3xl transform -translate-x-1/3 translate-y-1/3 pointer-events-none"></div>

            <div className="bg-white/95 backdrop-blur-md p-10 rounded-[3rem] shadow-2xl w-full max-w-md border-[6px] border-white relative z-10">
              <div className="text-center mb-10">
                <div className="w-32 h-32 mx-auto mb-6 flex items-center justify-center bg-sky-50 rounded-full border-4 border-sky-200 shadow-inner overflow-hidden relative">
                  <img src="https://i.postimg.cc/cLsf9TH7/padoban-sangjing.png" alt="파도반 상징" className="w-full h-full object-contain p-4 drop-shadow-sm z-10 relative" />
                  <div className="absolute bottom-0 w-full h-1/2 bg-sky-100/50"></div>
                </div>
                <h1 className="text-4xl font-black text-sky-800 tracking-tight">파도반 로그인</h1>
                <p className="text-orange-600 mt-2 font-bold bg-orange-50 inline-block px-4 py-1.5 rounded-full">우리 반의 따뜻한 공간 🐳</p>
              </div>
              
              <form onSubmit={handleLogin} className="space-y-5">
                <div>
                  <label className="block text-sm font-black text-sky-800 mb-2 pl-3">내 이름</label>
                  <input 
                    type="text" value={loginName} onChange={(e) => setLoginName(e.target.value)}
                    className="w-full px-6 py-4 rounded-[1.5rem] border-2 border-sky-100 focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-50 bg-stone-50 font-black text-lg text-stone-800 placeholder:text-stone-300 transition-all shadow-inner"
                    placeholder="이름을 입력하세요" required
                  />
                </div>
                <div>
                  <label className="block text-sm font-black text-sky-800 mb-2 pl-3">비밀번호</label>
                  <input 
                    type="password" value={loginPwd} onChange={(e) => setLoginPwd(e.target.value)}
                    className="w-full px-6 py-4 rounded-[1.5rem] border-2 border-sky-100 focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-50 bg-stone-50 font-black text-lg text-stone-800 placeholder:text-stone-300 transition-all shadow-inner"
                    placeholder="비밀번호" required
                  />
                </div>
                {loginError && (
                  <div className="bg-rose-100 text-rose-700 p-3 rounded-2xl text-center font-bold text-sm border border-rose-200 animate-pulse">
                    {loginError}
                  </div>
                )}
                <button type="submit" className="w-full bg-gradient-to-r from-orange-400 to-orange-500 hover:from-orange-500 hover:to-orange-600 text-white font-black py-5 px-4 rounded-[1.5rem] shadow-xl shadow-orange-300/50 transition-all transform hover:-translate-y-1 active:scale-95 text-xl mt-4 border-b-4 border-orange-700/40">
                  문 열기 🚪
                </button>
              </form>
            </div>
          </div>
        );
      }

      function PasswordChangeModal({ onClose, onSave }) {
        const [pwd1, setPwd1] = useState('');
        const [pwd2, setPwd2] = useState('');
        const [errorMsg, setErrorMsg] = useState('');

        const handleSubmit = (e) => {
          e.preventDefault();
          if (!/^\d{4}$/.test(pwd1)) {
            setErrorMsg('비밀번호는 숫자 4자리로 입력해주세요. (예: 0715)');
            return;
          }
          if (pwd1 !== pwd2) {
            setErrorMsg('비밀번호가 서로 다릅니다. 다시 확인해주세요.');
            return;
          }
          onSave(pwd1);
        };

        return (
          <div className="fixed inset-0 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center z-[200] p-4">
            <div className="bg-white rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl relative border-4 border-orange-200">
              <div className="text-center mb-6">
                <span className="text-5xl drop-shadow-md block mb-3">🔐</span>
                <h3 className="font-black text-2xl text-stone-800">비밀번호 설정</h3>
                <p className="text-sm font-bold text-stone-500 mt-2 break-keep">안전한 나만의 4자리 숫자 비밀번호를 만들어주세요!</p>
              </div>

              <form onSubmit={handleSubmit} className="space-y-4">
                <div>
                  <input type="password" placeholder="새로운 4자리 숫자 입력" value={pwd1} onChange={e => setPwd1(e.target.value)} maxLength={4} className="w-full bg-orange-50 border-2 border-orange-100 rounded-2xl px-5 py-4 font-black text-center text-2xl focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-50 text-stone-800 tracking-[0.5em]" required />
                </div>
                <div>
                  <input type="password" placeholder="비밀번호 한 번 더 확인" value={pwd2} onChange={e => setPwd2(e.target.value)} maxLength={4} className="w-full bg-orange-50 border-2 border-orange-100 rounded-2xl px-5 py-4 font-black text-center text-2xl focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-50 text-stone-800 tracking-[0.5em]" required />
                </div>
                
                {errorMsg && <p className="text-rose-600 text-sm font-bold text-center bg-rose-100 p-3 rounded-xl border border-rose-200">{errorMsg}</p>}
                
                <div className="flex gap-3 mt-6">
                  <button type="button" onClick={onClose} className="flex-1 bg-stone-100 text-stone-500 font-black py-4 rounded-2xl hover:bg-stone-200 transition">나중에</button>
                  <button type="submit" className="flex-1 bg-orange-400 hover:bg-orange-500 text-white font-black py-4 rounded-2xl shadow-md transition transform hover:-translate-y-1">변경하기</button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      function TeacherDashboard({ currentUser, dbData, setDbData, updateStudentData, syncToServer, showToast }) {
        const [activeTab, setActiveTab] = useState('students');
        const [batchMoney, setBatchMoney] = useState('');
        const [batchExp, setBatchExp] = useState('');
        const [selectedStudentProfile, setSelectedStudentProfile] = useState(null);

        const students = dbData.Users.filter(u => u.role === 'student');

        const handleBatchReward = (type) => {
          if (type === 'money') {
            const val = Number(batchMoney);
            if (!val || val <= 0) return showToast('올바른 금액을 입력하세요.');
            students.forEach(s => updateStudentData(s.id, { money: Number(s.money) + val }));
            setBatchMoney('');
            showToast(`학급 전체에게 ${val}원이 지급되었습니다! 💰`);
          } else if (type === 'exp') {
            const val = Number(batchExp);
            if (!val || val <= 0) return showToast('올바른 경험치를 입력하세요.');
            students.forEach(s => updateStudentData(s.id, { exp: Number(s.exp) + val }));
            setBatchExp('');
            showToast(`학급 전체에게 경험치 ${val}이 지급되었습니다! ⭐`);
          }
        };

        const tabs = [
          { id: 'students', label: '학급 관리', icon: '🌱' },
          { id: 'tasks', label: '할 일', icon: '📝' },
          { id: 'emotions', label: '마음 일기', icon: '🫧' },
          { id: 'announcements', label: '알림장', icon: '📢' },
          { id: 'halloffame', label: '명예의 전당', icon: '🏆' },
          { id: 'approvals', label: `아이템 승인 (${dbData.PendingItems?.length || 0})`, icon: '🎁' },
        ];

        return (
          <div className="space-y-6">
            <div className="flex bg-white/80 backdrop-blur-md rounded-3xl shadow-sm p-2 gap-2 overflow-x-auto border border-orange-100 custom-scrollbar">
              {tabs.map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 min-w-[110px] flex items-center justify-center gap-2 py-3 px-4 rounded-2xl font-bold transition-all ${activeTab === tab.id ? 'bg-orange-400 text-white shadow-md' : 'text-stone-600 hover:bg-orange-50'}`}>
                  <span className="text-xl">{tab.icon}</span>
                  <span className="whitespace-nowrap">{tab.label}</span>
                </button>
              ))}
            </div>

            {activeTab === 'students' && (
              <div className="space-y-6">
                <div className="bg-gradient-to-r from-orange-100 to-amber-100 p-6 rounded-[2rem] shadow-sm border border-white flex flex-col md:flex-row gap-4 justify-between md:items-center">
                  <div>
                    <h3 className="font-black text-orange-900 text-xl flex items-center gap-2">🎁 학급 전체 선물하기</h3>
                    <p className="text-orange-800 mt-1 font-bold">우리 반 모두에게 용돈과 경험치를 주세요!</p>
                  </div>
                  <div className="flex flex-col gap-3 w-full md:w-auto">
                    <div className="flex gap-2">
                      <input type="number" placeholder="용돈 입력" value={batchMoney} onChange={e => setBatchMoney(e.target.value)} className="w-full md:w-32 bg-white/95 border-none rounded-xl px-4 py-3 font-bold focus:ring-2 focus:ring-orange-400 text-stone-800 shadow-inner" />
                      <button onClick={() => handleBatchReward('money')} className="bg-amber-400 hover:bg-amber-500 text-white font-black px-5 py-3 rounded-xl whitespace-nowrap shadow-md transition">💰 일괄 지급</button>
                    </div>
                    <div className="flex gap-2">
                      <input type="number" placeholder="경험치 입력" value={batchExp} onChange={e => setBatchExp(e.target.value)} className="w-full md:w-32 bg-white/95 border-none rounded-xl px-4 py-3 font-bold focus:ring-2 focus:ring-orange-400 text-stone-800 shadow-inner" />
                      <button onClick={() => handleBatchReward('exp')} className="bg-blue-400 hover:bg-blue-500 text-white font-black px-5 py-3 rounded-xl whitespace-nowrap shadow-md transition">⭐ 일괄 지급</button>
                    </div>
                  </div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                  {students.map(student => (
                    <StudentManagerCard key={student.id} student={student} updateStudentData={updateStudentData} showToast={showToast} shopItems={dbData.ShopItems} onOpenProfile={() => setSelectedStudentProfile(student)} />
                  ))}
                </div>
              </div>
            )}

            {activeTab === 'tasks' && <TaskManagerTeacher currentUser={currentUser} dbData={dbData} setDbData={setDbData} updateStudentData={updateStudentData} syncToServer={syncToServer} showToast={showToast} />}
            {activeTab === 'emotions' && <EmotionBoard currentUser={currentUser} dbData={dbData} setDbData={setDbData} syncToServer={syncToServer} showToast={showToast} />}
            {activeTab === 'announcements' && <AnnouncementManager currentUser={currentUser} dbData={dbData} setDbData={setDbData} syncToServer={syncToServer} showToast={showToast} />}
            {activeTab === 'halloffame' && <HallOfFameManager currentUser={currentUser} dbData={dbData} setDbData={setDbData} syncToServer={syncToServer} showToast={showToast} />}
            {activeTab === 'approvals' && <ApprovalManager dbData={dbData} setDbData={setDbData} syncToServer={syncToServer} showToast={showToast} />}

            {selectedStudentProfile && <StudentProfileModal student={selectedStudentProfile} shopItems={dbData.ShopItems} onClose={() => setSelectedStudentProfile(null)} />}
          </div>
        );
      }

      function StudentManagerCard({ student, updateStudentData, showToast, shopItems, onOpenProfile }) {
        const [expAmount, setExpAmount] = useState('');
        const [moneyAmount, setMoneyAmount] = useState('');
        const [newTitle, setNewTitle] = useState('');
        const [selectedItemToGive, setSelectedItemToGive] = useState('');

        const equippedItems = Array.isArray(student.equippedItems) ? student.equippedItems : [];
        const safeShopItems = Array.isArray(shopItems) ? shopItems : [];
        const equippedIcons = equippedItems.map(id => safeShopItems.find(i => String(i.id) === String(id))?.icon).filter(Boolean);
        
        const handleGiveItem = () => {
          if(!selectedItemToGive) return showToast('아이템을 선택하세요.');
          const owned = Array.isArray(student.ownedItems) ? student.ownedItems : [];
          if(owned.some(id => String(id) === String(selectedItemToGive))) return showToast('이미 가진 아이템입니다.');
          updateStudentData(student.id, { ownedItems: [...owned, selectedItemToGive] });
          showToast(`${student.name}에게 선물을 주었습니다!`);
          setSelectedItemToGive('');
        };

        const handleGiveTitle = () => {
          if(!newTitle.trim()) return showToast('칭호를 입력하세요.');
          const currentTitles = Array.isArray(student.ownedTitles) ? student.ownedTitles : [];
          if(currentTitles.includes(newTitle)) return showToast('이미 가진 칭호입니다.');
          updateStudentData(student.id, { ownedTitles: [...currentTitles, newTitle], title: newTitle });
          showToast(`${student.name}에게 새 칭호를 주었습니다!`);
          setNewTitle('');
        };

        return (
          <div className="bg-white/95 p-6 rounded-[2rem] shadow-sm border border-stone-100 flex flex-col gap-5">
            <div className="flex justify-between items-center border-b border-stone-50 pb-4">
              <div className="flex items-center gap-4">
                <div className="relative w-16 h-16 bg-orange-50 rounded-full flex items-center justify-center border-4 border-white shadow-inner overflow-hidden cursor-pointer" onClick={onOpenProfile}>
                   {student.faceUrl ? (
                      <img src={student.faceUrl} alt="프로필" className="w-full h-full object-cover" />
                   ) : (
                      <span className="text-3xl text-orange-200">👦</span>
                   )}
                   <div className="absolute inset-0 flex items-center justify-center">
                     {equippedIcons.map((icon, idx) => (
                       isImageUrl(icon) ? <img key={idx} src={icon} alt="장착" className="absolute w-12 h-12 object-contain drop-shadow-md" /> : <span key={idx} className="absolute text-3xl drop-shadow-md">{safeText(icon)}</span>
                     ))}
                   </div>
                </div>
                <div>
                  <div className="flex items-center gap-2 mb-1">
                    <button onClick={onOpenProfile} className="font-black text-xl text-stone-800 hover:text-orange-500 transition-colors">{safeText(student.name)}</button>
                  </div>
                  <div className="text-xs font-bold text-orange-700 bg-orange-100 px-3 py-1 rounded-full inline-block">{safeText(student.title) || '새싹 파도'}</div>
                </div>
              </div>
              <div className="text-right">
                <div className="font-black text-sky-600 text-lg">Lv.{student.level}</div>
                <div className="text-xs font-bold text-stone-400 mt-1">⭐ {student.exp} | 🪙 {student.money}</div>
              </div>
            </div>

            <div className="space-y-3">
              <div className="flex gap-2">
                <input type="number" placeholder="경험치 (예:10)" value={expAmount} onChange={e => setExpAmount(e.target.value)} className="flex-1 bg-stone-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-sky-300 font-bold text-stone-800" />
                <button onClick={() => { updateStudentData(student.id, { exp: Number(student.exp) + Number(expAmount) }); showToast(`${student.name} EXP 지급!`); setExpAmount(''); }} className="bg-sky-400 hover:bg-sky-500 text-white font-bold px-4 py-3 rounded-xl text-sm shadow-sm shrink-0 whitespace-nowrap transition">EXP 지급</button>
              </div>
              <div className="flex gap-2">
                <input type="number" placeholder="용돈 (예:100)" value={moneyAmount} onChange={e => setMoneyAmount(e.target.value)} className="flex-1 bg-stone-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-amber-300 font-bold text-stone-800" />
                <button onClick={() => { updateStudentData(student.id, { money: Number(student.money) + Number(moneyAmount) }); showToast(`${student.name} 용돈 지급!`); setMoneyAmount(''); }} className="bg-amber-400 hover:bg-amber-500 text-white font-bold px-4 py-3 rounded-xl text-sm shadow-sm shrink-0 whitespace-nowrap transition">용돈 지급</button>
              </div>
              <div className="flex gap-2">
                <input type="text" placeholder="새로운 칭호 하사하기" value={newTitle} onChange={e => setNewTitle(e.target.value)} className="flex-1 bg-stone-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-orange-300 font-bold text-stone-800" />
                <button onClick={handleGiveTitle} className="bg-orange-400 hover:bg-orange-500 text-white font-bold px-4 py-3 rounded-xl text-sm shadow-sm shrink-0 whitespace-nowrap transition">칭호 부여</button>
              </div>
              <div className="flex gap-2">
                <select value={selectedItemToGive} onChange={e => setSelectedItemToGive(e.target.value)} className="flex-1 bg-stone-50 border-none rounded-xl px-3 py-3 text-sm focus:ring-2 focus:ring-purple-300 font-bold outline-none text-stone-800">
                  <option value="">🎁 상점 아이템 선물하기...</option>
                  {safeShopItems.map(item => <option key={item.id} value={item.id}>{item.name}</option>)}
                </select>
                <button onClick={handleGiveItem} className="bg-purple-400 hover:bg-purple-500 text-white font-bold px-4 py-3 rounded-xl text-sm shadow-sm shrink-0 whitespace-nowrap transition">선물하기</button>
              </div>
            </div>
          </div>
        );
      }

      function TaskManagerTeacher({ currentUser, dbData, setDbData, updateStudentData, syncToServer, showToast }) {
        const [title, setTitle] = useState('');
        const [desc, setDesc] = useState('');
        const [deadlineDate, setDeadlineDate] = useState('');
        const [deadlineTime, setDeadlineTime] = useState('');
        const [selectedTaskId, setSelectedTaskId] = useState(null); 

        const [editingTaskId, setEditingTaskId] = useState(null);
        const [editTitle, setEditTitle] = useState('');
        const [editDesc, setEditDesc] = useState('');
        const [editDate, setEditDate] = useState('');
        const [editTime, setEditTime] = useState('');
        const [rewardModal, setRewardModal] = useState(null);
        const [confirmAction, setConfirmAction] = useState(null); 

        const students = dbData.Users.filter(u => u.role === 'student');
        const tasks = Array.isArray(dbData.Tasks) ? dbData.Tasks : [];

        const selectedTask = tasks.find(t => t.id === selectedTaskId) || null;

        const handlePost = (e) => {
          e.preventDefault();
          if (!title || !desc) return;
          const newTask = {
            id: Date.now().toString(),
            title,
            description: desc,
            deadlineDate,
            deadlineTime,
            authorName: currentUser.name,
            submittedUsers: [],
            approvedUsers: []
          };
          setDbData(prev => ({ ...prev, Tasks: [newTask, ...tasks] }));
          syncToServer('Tasks', 'INSERT', null, newTask);
          setTitle(''); setDesc(''); setDeadlineDate(''); setDeadlineTime('');
          showToast('새 할 일이 등록되었습니다! 📝');
        };

        const requestDelete = (id) => {
          setConfirmAction({
            title: '할 일 삭제',
            message: '정말 이 할 일을 삭제할까요?\n학생들의 제출 기록도 모두 사라집니다.',
            onConfirm: () => executeDelete(id)
          });
        };

        const executeDelete = (id) => {
          setDbData(prev => ({ ...prev, Tasks: prev.Tasks.filter(t => t.id !== id) }));
          syncToServer('Tasks', 'DELETE', id, null);
          setSelectedTaskId(null);
          showToast('과제가 삭제되었습니다.');
        };

        const startEdit = (task) => {
          setEditingTaskId(task.id);
          setEditTitle(task.title);
          setEditDesc(task.description);
          setEditDate(task.deadlineDate || '');
          setEditTime(task.deadlineTime || '');
        };

        const handleUpdateTask = (e) => {
          e.preventDefault();
          const updates = { title: editTitle, description: editDesc, deadlineDate: editDate, deadlineTime: editTime };
          setDbData(prev => ({
            ...prev,
            Tasks: prev.Tasks.map(t => t.id === editingTaskId ? { ...t, ...updates } : t)
          }));
          syncToServer('Tasks', 'UPDATE', editingTaskId, updates);
          setEditingTaskId(null);
          showToast('할 일이 수정되었습니다. 📝');
        };

        const requestReject = (taskId, studentId, studentName) => {
          setConfirmAction({
            title: '다시 하세요 (반려)',
            message: `${studentName} 학생의 과제를 반려할까요?\n제출 상태가 해제됩니다.`,
            onConfirm: () => executeReject(taskId, studentId, studentName)
          });
        };

        const executeReject = (taskId, studentId, studentName) => {
          const task = tasks.find(t => t.id === taskId);
          if(!task) return;
          let newSubmitted = [...(task.submittedUsers || [])].filter(id => id !== studentId);
          let newApproved = [...(task.approvedUsers || [])].filter(id => id !== studentId);
          
          setDbData(prev => ({
            ...prev,
            Tasks: prev.Tasks.map(t => t.id === taskId ? { ...t, submittedUsers: newSubmitted, approvedUsers: newApproved } : t)
          }));
          syncToServer('Tasks', 'UPDATE', taskId, { submittedUsers: newSubmitted, approvedUsers: newApproved });
          showToast(`${studentName} 학생의 제출이 반려되었습니다.`);
        };

        const requestCancelApproval = (taskId, studentId, studentName) => {
          setConfirmAction({
            title: '확인 완료 취소',
            message: `${studentName} 학생의 '확인 완료' 상태를 취소할까요? (다시 제출된 상태로 되돌아갑니다.)`,
            onConfirm: () => executeCancelApproval(taskId, studentId, studentName)
          });
        };

        const executeCancelApproval = (taskId, studentId, studentName) => {
          const task = tasks.find(t => t.id === taskId);
          if(!task) return;
          let newApproved = [...(task.approvedUsers || [])].filter(id => id !== studentId);
          
          setDbData(prev => ({
            ...prev,
            Tasks: prev.Tasks.map(t => t.id === taskId ? { ...t, approvedUsers: newApproved } : t)
          }));
          syncToServer('Tasks', 'UPDATE', taskId, { approvedUsers: newApproved });
          showToast(`${studentName} 학생의 확인 완료 상태가 취소되었습니다.`);
        };

        const showRewardModal = (taskId, studentId, studentName) => {
          setRewardModal({ taskId, studentId, studentName, exp: '', money: '' });
        };

        const handleRewardApprove = () => {
          const { taskId, studentId, studentName, exp, money } = rewardModal;
          const task = tasks.find(t => t.id === taskId);
          if(!task) return;
          
          const newApproved = [...(task.approvedUsers || [])];
          if (!newApproved.includes(studentId)) newApproved.push(studentId);
          
          setDbData(prev => ({
            ...prev,
            Tasks: prev.Tasks.map(t => t.id === taskId ? { ...t, approvedUsers: newApproved } : t)
          }));
          syncToServer('Tasks', 'UPDATE', taskId, { approvedUsers: newApproved });

          const expVal = parseInt(exp) || 0;
          const moneyVal = parseInt(money) || 0;
          const student = students.find(s => s.id === studentId);
          if (student && (expVal > 0 || moneyVal > 0)) {
             updateStudentData(studentId, {
               exp: Number(student.exp) + expVal,
               money: Number(student.money) + moneyVal
             });
             showToast(`${studentName} 학생 확인 완료! 보상 지급됨.`);
          } else {
             showToast(`${studentName} 학생 확인 완료!`);
          }
          
          setRewardModal(null);
        };

        return (
          <div className="space-y-6 relative">
            <form onSubmit={handlePost} className="bg-white/90 p-6 rounded-[2rem] shadow-sm border border-indigo-100 space-y-4">
              <h3 className="font-black text-xl text-indigo-900 mb-2">📝 새로운 할 일 등록</h3>
              <input type="text" placeholder="제목 (예: 수학 익힘책 풀기)" value={title} onChange={e=>setTitle(e.target.value)} className="w-full bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800 shadow-inner" required />
              <textarea placeholder="할 일의 자세한 내용을 적어주세요." value={desc} onChange={e=>setDesc(e.target.value)} rows="3" className="w-full bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800 shadow-inner resize-none" required />
              <div className="flex gap-4">
                <div className="flex-1">
                   <label className="block text-xs font-bold text-indigo-500 mb-1 pl-1">마감 날짜 (선택)</label>
                   <input type="date" value={deadlineDate} onChange={e=>setDeadlineDate(e.target.value)} className="w-full bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800 shadow-inner" />
                </div>
                <div className="flex-1">
                   <label className="block text-xs font-bold text-indigo-500 mb-1 pl-1">마감 시각 (선택)</label>
                   <input type="time" value={deadlineTime} onChange={e=>setDeadlineTime(e.target.value)} className="w-full bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800 shadow-inner" />
                </div>
              </div>
              <button type="submit" className="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-black py-4 rounded-xl shadow-md transition border border-indigo-600">할 일 등록하기</button>
            </form>

            <div className="space-y-4">
              {tasks.length === 0 ? (
                <div className="text-center py-10 text-indigo-400 font-black bg-white/50 border border-indigo-100 rounded-[2rem]">등록된 할 일이 없습니다.</div>
              ) : (
                tasks.map(task => {
                  const submittedCount = Array.isArray(task.submittedUsers) ? task.submittedUsers.length : 0;
                  const approvedCount = Array.isArray(task.approvedUsers) ? task.approvedUsers.length : 0;
                  const totalCount = students.length;
                  
                  return (
                    <div key={task.id} onClick={() => setSelectedTaskId(task.id)} className="bg-white/95 p-6 rounded-[2rem] shadow-sm border border-indigo-50 cursor-pointer hover:border-indigo-300 hover:shadow-md transition-all group relative overflow-hidden">
                      <div className="absolute top-0 right-0 w-20 h-20 bg-indigo-50 rounded-bl-full -z-10 group-hover:scale-110 transition-transform"></div>
                      
                      <div className="flex justify-between items-start mb-2">
                        <h4 className="font-black text-xl text-stone-800">{safeText(task.title)}</h4>
                        <div className="text-right shrink-0">
                          <span className="text-xs bg-indigo-100 text-indigo-800 font-black px-3 py-1 rounded-full whitespace-nowrap">
                            제출 {submittedCount}/{totalCount}
                          </span>
                        </div>
                      </div>
                      
                      {task.deadlineDate && (
                        <div className="text-xs text-rose-500 font-bold mb-3">
                          마감: {task.deadlineDate} {task.deadlineTime || ''}
                        </div>
                      )}
                      
                      <p className="text-stone-600 font-medium text-sm line-clamp-2">{safeText(task.description)}</p>
                      
                      <div className="mt-4 pt-3 border-t border-stone-50 flex justify-between items-center">
                        <span className="text-xs text-stone-400 font-bold">자세히 보려면 클릭하세요</span>
                        <span className="text-xs font-black text-emerald-600 bg-emerald-50 px-2 py-1 rounded-lg border border-emerald-100">
                          확인완료 {approvedCount}명
                        </span>
                      </div>
                    </div>
                  );
                })
              )}
            </div>

            {selectedTask && (
              <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4" onClick={(e) => {if(e.target === e.currentTarget) {setSelectedTaskId(null); setEditingTaskId(null);}}}>
                <div className="bg-white rounded-[2.5rem] p-6 md:p-8 max-w-2xl w-full shadow-2xl relative max-h-[90vh] flex flex-col border border-indigo-100">
                  
                  {editingTaskId ? (
                    <form onSubmit={handleUpdateTask} className="space-y-4 mb-4">
                      <div className="flex justify-between items-center mb-2">
                        <h3 className="font-black text-xl text-indigo-900">할 일 수정</h3>
                        <button type="button" onClick={() => setEditingTaskId(null)} className="text-sm font-bold text-stone-400 hover:text-stone-600">취소</button>
                      </div>
                      <input type="text" value={editTitle} onChange={e=>setEditTitle(e.target.value)} className="w-full bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800" required />
                      <textarea value={editDesc} onChange={e=>setEditDesc(e.target.value)} rows="3" className="w-full bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800 resize-none" required />
                      <div className="flex gap-4">
                        <input type="date" value={editDate} onChange={e=>setEditDate(e.target.value)} className="w-full bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800" />
                        <input type="time" value={editTime} onChange={e=>setEditTime(e.target.value)} className="w-full bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800" />
                      </div>
                      <button type="submit" className="w-full bg-indigo-500 text-white font-black py-3 rounded-xl shadow-md">저장하기</button>
                    </form>
                  ) : (
                    <div className="mb-6 flex justify-between items-start gap-4">
                      <div>
                        <h3 className="font-black text-2xl text-stone-800 mb-2">{safeText(selectedTask.title)}</h3>
                        {selectedTask.deadlineDate && <div className="text-sm text-rose-500 font-bold mb-3">마감: {selectedTask.deadlineDate} {selectedTask.deadlineTime || ''}</div>}
                        <p className="text-stone-600 font-medium whitespace-pre-wrap text-sm bg-stone-50 p-4 rounded-2xl">{safeText(selectedTask.description)}</p>
                      </div>
                      <div className="flex gap-2 shrink-0 flex-col sm:flex-row">
                        <button onClick={() => startEdit(selectedTask)} className="bg-stone-100 text-stone-600 hover:bg-stone-200 p-2 px-3 rounded-xl font-bold transition text-sm">수정</button>
                        <button onClick={() => requestDelete(selectedTask.id)} className="bg-rose-50 text-rose-500 hover:bg-rose-100 p-2 px-3 rounded-xl font-bold transition text-sm">삭제</button>
                        <button onClick={() => {setSelectedTaskId(null); setEditingTaskId(null);}} className="bg-stone-800 text-white hover:bg-stone-900 p-2 px-3 rounded-xl font-bold transition text-sm">닫기</button>
                      </div>
                    </div>
                  )}
                  
                  <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                    <h4 className="font-black text-lg text-indigo-800 mb-3 border-b border-indigo-100 pb-2">학생 제출 현황</h4>
                    <div className="space-y-2">
                      {students.map(student => {
                        const isSubmitted = (selectedTask.submittedUsers || []).includes(student.id);
                        const isApproved = (selectedTask.approvedUsers || []).includes(student.id);
                        
                        return (
                          <div key={student.id} className={`flex items-center justify-between p-3 rounded-xl border ${isApproved ? 'bg-emerald-50/50 border-emerald-100' : isSubmitted ? 'bg-indigo-50/50 border-indigo-100' : 'bg-stone-50 border-stone-100'}`}>
                            <span className="font-bold text-stone-800 flex items-center gap-2">
                              {safeText(student.name)}
                            </span>
                            
                            {isApproved ? (
                              <div className="flex items-center gap-2">
                                <span className="text-xs font-black text-emerald-600 bg-emerald-100 px-3 py-1.5 rounded-full">확인 완료 🎉</span>
                                <button onClick={() => requestCancelApproval(selectedTask.id, student.id, student.name)} className="text-[10px] font-bold bg-amber-100 hover:bg-amber-200 text-amber-700 px-2 py-1.5 rounded-lg transition shadow-sm" title="확인 완료 취소">취소</button>
                              </div>
                            ) : isSubmitted ? (
                              <div className="flex items-center gap-2">
                                <button onClick={() => requestReject(selectedTask.id, student.id, student.name)} className="text-[10px] font-bold bg-rose-100 hover:bg-rose-200 text-rose-700 px-3 py-1.5 rounded-xl transition">다시 하세요 ↩️</button>
                                <button onClick={() => showRewardModal(selectedTask.id, student.id, student.name)} className="text-xs font-black bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-1.5 rounded-full transition shadow-sm">잘 했어요 👍</button>
                              </div>
                            ) : (
                              <span className="text-xs font-bold text-stone-400 bg-stone-100 px-3 py-1.5 rounded-full">미제출</span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {rewardModal && (

                  <div className="flex gap-3">

                    <button onClick={() => { confirmAction.onConfirm(); setConfirmAction(null); }} className="flex-1 bg-rose-500 text-white font-black py-3 rounded-xl shadow-md hover:bg-rose-600">예, 진행합니다</button>
                  </div>
                </div>
              </div>

      function TaskManagerStudent({ currentUser, dbData, setDbData, syncToServer, showToast }) {
        const tasks = Array.isArray(dbData.Tasks) ? dbData.Tasks : [];
        const [confirmAction, setConfirmAction] = useState(null);

        const requestSubmit = (taskId) => {
          setConfirmAction({
            title: '다 했어요 ✋',
            message: '이 할 일을 다 끝냈나요?\n선생님께 완료를 알립니다.',
            onConfirm: () => executeSubmit(taskId)
          });
        };

        const executeSubmit = (taskId) => {
          const task = tasks.find(t => t.id === taskId);
          if(!task) return;
          const newSubmitted = [...(task.submittedUsers || []), currentUser.id];
          setDbData(prev => ({
            ...prev,
            Tasks: prev.Tasks.map(t => t.id === taskId ? { ...t, submittedUsers: newSubmitted } : t)
          }));
          syncToServer('Tasks', 'UPDATE', taskId, { submittedUsers: newSubmitted });
          showToast('과제를 제출했습니다! 📝');
        };

        const requestCancelSubmit = (taskId) => {
          setConfirmAction({
            title: '제출 취소',
            message: '아직 덜 끝냈나요?\n제출 상태를 취소합니다.',
            onConfirm: () => executeCancelSubmit(taskId)
          });
        };

        const executeCancelSubmit = (taskId) => {
          const task = tasks.find(t => t.id === taskId);
          if(!task) return;
          const newSubmitted = (task.submittedUsers || []).filter(id => id !== currentUser.id);
          setDbData(prev => ({
            ...prev,
            Tasks: prev.Tasks.map(t => t.id === taskId ? { ...t, submittedUsers: newSubmitted } : t)
          }));
          syncToServer('Tasks', 'UPDATE', taskId, { submittedUsers: newSubmitted });
          showToast('제출을 취소했습니다.');
        };

        return (
          <div className="space-y-4">
            {tasks.length === 0 ? (
              <div className="text-center py-10 text-indigo-400 font-black bg-white/50 border border-indigo-100 rounded-[2rem]">등록된 할 일이 없습니다.</div>
            ) : (
              tasks.map(task => {
                const isSubmitted = (task.submittedUsers || []).includes(currentUser.id);
                const isApproved = (task.approvedUsers || []).includes(currentUser.id);

                return (
                  <div key={task.id} className="bg-white/95 p-6 rounded-[2rem] shadow-sm border border-indigo-50 relative overflow-hidden group">
                    <div className="absolute top-0 right-0 w-24 h-24 bg-indigo-50/50 rounded-bl-[100px] -z-10"></div>
                    <h4 className="font-black text-xl text-stone-800 mb-2">{safeText(task.title)}</h4>
                    {task.deadlineDate && (
                      <div className="text-xs text-rose-500 font-bold mb-3">마감: {task.deadlineDate} {task.deadlineTime || ''}</div>
                    )}
                    <p className="text-stone-600 font-medium text-sm whitespace-pre-wrap bg-stone-50 p-4 rounded-2xl mb-4">{safeText(task.description)}</p>

                    <div className="flex justify-end mt-4">
                      {isApproved ? (
                        <div className="bg-emerald-100 text-emerald-700 font-black px-4 py-2 rounded-xl border border-emerald-200 shadow-sm">선생님 확인 완료! 🎉</div>
                      ) : isSubmitted ? (
                        <button onClick={() => requestCancelSubmit(task.id)} className="bg-stone-200 hover:bg-stone-300 text-stone-700 font-black px-5 py-3 rounded-xl transition shadow-sm">제출 취소</button>
                      ) : (
                        <button onClick={() => requestSubmit(task.id)} className="bg-indigo-500 hover:bg-indigo-600 text-white font-black px-5 py-3 rounded-xl transition shadow-md">다 했어요 ✋</button>
                      )}
                    </div>
                  </div>
                )
              })
            )}

            {confirmAction && (
              <div className="fixed inset-0 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center z-[200] p-4">
                <div className="bg-white rounded-[2rem] p-6 max-w-xs w-full shadow-2xl text-center border-4 border-stone-100">
                  <h3 className="font-black text-xl text-stone-800 mb-2">{confirmAction.title}</h3>
                  <p className="text-stone-600 font-bold mb-6 text-sm whitespace-pre-wrap">{confirmAction.message}</p>
                  <div className="flex gap-3">
                    <button onClick={() => setConfirmAction(null)} className="flex-1 bg-stone-100 text-stone-600 font-black py-3 rounded-xl hover:bg-stone-200">아니오</button>
                    <button onClick={() => { confirmAction.onConfirm(); setConfirmAction(null); }} className="flex-1 bg-indigo-500 text-white font-black py-3 rounded-xl shadow-md hover:bg-indigo-600">예</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      function StudentDashboard({ currentUser, dbData, setDbData, updateStudentData, syncToServer, showToast, onOpenPwdModal }) {

            </div>

            {activeTab === 'profile' && <StudentProfile currentUser={currentUser} shopItems={dbData.ShopItems} updateStudentData={updateStudentData} showToast={showToast} onOpenPwdModal={onOpenPwdModal} />}
            {activeTab === 'tasks' && <TaskManagerStudent currentUser={currentUser} dbData={dbData} setDbData={setDbData} syncToServer={syncToServer} showToast={showToast} />}
            {activeTab === 'emotions' && <EmotionBoard currentUser={currentUser} dbData={dbData} setDbData={setDbData} syncToServer={syncToServer} showToast={showToast} />}

            {activeTab === 'halloffame' && <HallOfFameManager currentUser={currentUser} dbData={dbData} setDbData={setDbData} syncToServer={syncToServer} showToast={showToast} />}

                <AnnouncementManager currentUser={currentUser} dbData={dbData} setDbData={setDbData} syncToServer={syncToServer} showToast={showToast} />
              </div>
            )}

            <div className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t border-orange-100 pb-safe z-50 md:hidden flex justify-around p-3 rounded-t-[2rem] shadow-[0_-4px_20px_rgba(0,0,0,0.1)]">
              {navItems.map(item => (
                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`relative flex flex-col items-center p-2 w-full transition-transform ${activeTab === item.id ? 'text-orange-500 scale-110' : 'text-stone-400 hover:text-orange-400'}`}>
                  <span className="text-2xl mb-1">{item.icon}</span>
                  <span className="text-[10px] font-black">{item.label}</span>
                  {item.badge > 0 && <span className="absolute top-0 right-1 bg-rose-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full shadow-sm animate-pulse">{item.badge}</span>}
                </button>
              ))}
            </div>
          </div>
        );
      }

      function StudentProfile({ currentUser, shopItems, updateStudentData, showToast, onOpenPwdModal }) {
        const currentExp = currentUser.exp % EXP_PER_LEVEL;
        const expPercent = (currentExp / EXP_PER_LEVEL) * 100;

        const equippedItems = Array.isArray(currentUser.equippedItems) ? currentUser.equippedItems : [];
        const ownedItems = Array.isArray(currentUser.ownedItems) ? currentUser.ownedItems : [];
        const ownedTitles = Array.isArray(currentUser.ownedTitles) ? currentUser.ownedTitles : [];
        const safeShopItems = Array.isArray(shopItems) ? shopItems : [];

        const [isEditingIntro, setIsEditingIntro] = useState(false);
        const [introText, setIntroText] = useState(currentUser.intro || '');
        
        const [isEditingFace, setIsEditingFace] = useState(false);
        const [faceUrlText, setFaceUrlText] = useState(currentUser.faceUrl || '');

        const toggleEquip = (itemId) => {
          let newEquipped = [...equippedItems];
          if (newEquipped.some(id => String(id) === String(itemId))) {
            newEquipped = newEquipped.filter(id => String(id) !== String(itemId));
            if(showToast) showToast('장착 해제!');
          } else {
            newEquipped.push(itemId);
            if(showToast) showToast('장착 완료! ✨');
          }
          updateStudentData(currentUser.id, { equippedItems: newEquipped });
        };

        const selectTitle = (title) => {
          updateStudentData(currentUser.id, { title: title });
          if(showToast) showToast(`'${title}'(으)로 칭호 변경!`);
        };

        const saveIntro = () => {
          updateStudentData(currentUser.id, { intro: introText });
          setIsEditingIntro(false);
          if(showToast) showToast('소개말 저장 완료!');
        };

        const saveFaceUrl = () => {
          updateStudentData(currentUser.id, { faceUrl: faceUrlText });
          setIsEditingFace(false);
          if(showToast) showToast('얼굴 사진 변경 완료!');

        const equippedIcons = equippedItems.map(id => safeShopItems.find(i => String(i.id) === String(id))?.icon || '');

        return (
          <div className="space-y-6">
            <div className="bg-white/90 p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-orange-100 flex flex-col md:flex-row items-center gap-8 relative overflow-hidden">
              <div className="absolute top-0 right-0 w-64 h-64 bg-orange-100 rounded-full blur-3xl opacity-50 -z-10 -translate-y-1/2 translate-x-1/2"></div>
              
              <div className="relative flex flex-col items-center">
                <div className="relative w-40 h-40 bg-gradient-to-tr from-orange-50 to-sky-50 rounded-full flex items-center justify-center shadow-inner border-[6px] border-white shrink-0 overflow-hidden">
                  {currentUser.faceUrl ? (
                    <img src={currentUser.faceUrl} alt="내 얼굴" className="w-full h-full object-cover" />
                  ) : (
                    <span className="text-6xl opacity-50 text-orange-400">👤</span>
                  )}
                  <div className="absolute inset-0 flex items-center justify-center drop-shadow-lg">
                    {equippedIcons.map((icon, idx) => (
                      isImageUrl(icon) ? <img key={idx} src={icon} alt="장착" className="absolute w-28 h-28 object-contain" /> : <span key={idx} className="absolute text-[5rem]">{safeText(icon)}</span>
                    ))}
                  </div>
                </div>
                
                {!isEditingFace ? (
                   <button onClick={() => setIsEditingFace(true)} className="mt-3 text-xs bg-white text-orange-600 font-bold px-3 py-1.5 rounded-full border border-orange-200 shadow-sm hover:bg-orange-50">사진 바꾸기 📷</button>
                ) : (
                  <div className="mt-3 flex flex-col gap-2 w-full max-w-[150px]">
                    <input type="text" value={faceUrlText} onChange={e=>setFaceUrlText(e.target.value)} placeholder="이미지 URL 주소" className="text-xs p-2 border border-orange-200 rounded-xl outline-none" />
                    <div className="flex gap-1 justify-center">
                      <button onClick={() => setIsEditingFace(false)} className="text-[10px] bg-stone-100 px-3 py-1 rounded-lg font-bold text-stone-500">취소</button>
                      <button onClick={saveFaceUrl} className="text-[10px] bg-orange-400 text-white px-3 py-1 rounded-lg font-bold">저장</button>
                    </div>
                  </div>
                )}
              </div>
              
              <div className="flex-1 w-full flex flex-col">
                <div className="flex justify-between items-start mb-4">
                  <div>
                    {currentUser.title && <span className="bg-orange-100 text-orange-900 text-sm font-black px-4 py-1.5 rounded-full mb-2 inline-block shadow-sm">✨ {safeText(currentUser.title)}</span>}
                    <h2 className="text-3xl font-black text-stone-800 mt-1">{safeText(currentUser.name)}</h2>
                  </div>
                  <div className="flex flex-col items-end gap-2">
                    <div className="flex items-center gap-1 text-amber-800 bg-amber-100 px-5 py-2.5 rounded-2xl font-black shadow-sm text-lg">🪙 {currentUser.money}원</div>
                    <button onClick={onOpenPwdModal} className="text-[10px] bg-white border border-stone-200 text-stone-600 px-3 py-1.5 rounded-full font-bold shadow-sm hover:bg-stone-50 flex items-center gap-1">
                      🔑 비밀번호 변경

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                  <div className="bg-orange-50/50 p-4 rounded-3xl border border-orange-100">
                    <div className="flex justify-between items-center mb-2">
                      <span className="text-sm font-black text-orange-800">💬 내 소개</span>

                        <button onClick={() => setIsEditingIntro(true)} className="text-[10px] bg-white px-2 py-1 rounded-lg text-orange-700 font-bold shadow-sm border border-orange-100">수정</button>

                    {!isEditingIntro ? (
                      <div className="text-sm font-bold text-stone-600 break-keep">{currentUser.intro || <span className="text-orange-400 font-medium">멋진 내 모습을 소개해보세요!</span>}</div>
                    ) : (
                      <input type="text" value={introText} onChange={e=>setIntroText(e.target.value)} maxLength={50} placeholder="최대 50자" className="w-full p-2 text-sm bg-white border border-orange-200 rounded-xl focus:ring-2 focus:ring-orange-300 font-bold outline-none text-stone-800" />
                    )}
                  </div>

                  <div className="bg-sky-50/50 p-4 rounded-3xl border border-sky-100">
                    <span className="text-sm font-black text-sky-800 block mb-2">🔑 아이모두 (i-modu)</span>

                        <ColorizeText text={currentUser.imoduId} />
                      </div>
                      <div className="flex items-center justify-between bg-white px-3 py-2 rounded-xl shadow-sm border border-sky-50">
                        <span className="text-xs font-bold text-stone-400">PW</span>
                        <ColorizeText text={currentUser.imoduPwd} />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div className="bg-white/90 p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-purple-100">
              <h3 className="font-black text-xl mb-5 text-purple-900 flex items-center gap-2">✨ 나의 칭호함</h3>
              {ownedTitles.length === 0 ? (
                <div className="text-center py-8 bg-purple-50 rounded-3xl text-purple-400 font-bold">선생님께 멋진 칭호를 받아보세요!</div>
              ) : (
                <div className="flex flex-wrap gap-3">
                  {ownedTitles.map((t, idx) => {
                    const isEquipped = currentUser.title === t;
                    return (
                      <button 
                        key={idx} onClick={() => selectTitle(t)} 
                        className={`px-5 py-3 rounded-2xl font-black text-sm transition-all ${isEquipped ? 'bg-purple-500 text-white shadow-md transform -translate-y-1' : 'bg-purple-50 text-purple-700 hover:bg-purple-100 border border-purple-100'}`}
                      >
                        {t} {isEquipped && '✅'}
                      </button>

            </div>

            <div className="bg-white/90 p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-pink-100">

                    const isEquipped = equippedItems.some(id => String(id) === String(itemId));
                    return (
                      <button key={itemId || idx} onClick={() => toggleEquip(itemId)} className={`flex flex-col items-center p-4 rounded-3xl border-2 transition-all ${isEquipped ? 'border-pink-300 bg-pink-50 shadow-md' : 'border-white bg-stone-50 hover:border-pink-200'}`}>
                        <div className="w-16 h-16 mb-3 flex items-center justify-center bg-white rounded-2xl border border-stone-100 shadow-sm">
                          {isImageUrl(item.icon) ? <img src={item.icon} alt={item.name} className="w-full h-full object-contain p-2" /> : <span className="text-4xl">{safeText(item.icon)}</span>}

                        <span className="text-xs font-black text-stone-700 text-center break-keep">{safeText(item.name)}</span>
                        {isEquipped && <span className="text-[10px] bg-pink-400 text-white px-3 py-1 rounded-full mt-2 font-bold shadow-sm">장착중</span>}
                      </button>

              )}
