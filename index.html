                <div className="bg-white/95 p-5 rounded-3xl mb-4 border border-sky-100 shadow-sm">
                  <div className="flex justify-between font-black mb-3"><span className="text-sky-700 text-lg">Level {currentUser.level}</span> <span className="text-sky-500">{currentExp} / {EXP_PER_LEVEL}</span></div>
                  <div className="h-5 bg-sky-50 rounded-full overflow-hidden shadow-inner border border-sky-100/50">
                    <div className="h-full bg-gradient-to-r from-sky-400 to-blue-400 transition-all duration-1000 rounded-full" style={{ width: `${expPercent}%` }}></div>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                  <div className="bg-orange-50/50 p-4 rounded-3xl border border-orange-100">
                    <div className="flex justify-between items-center mb-2">
                      <span className="text-sm font-black text-orange-800">💬 내 소개</span>
                      {!isEditingIntro ? (
                        <button onClick={() => setIsEditingIntro(true)} className="text-[10px] bg-white px-2 py-1 rounded-lg text-orange-700 font-bold shadow-sm border border-orange-100">수정</button>
                      ) : (
                        <div className="flex gap-1">
                          <button onClick={() => setIsEditingIntro(false)} className="text-[10px] bg-white px-2 py-1 rounded-lg text-stone-500 border border-stone-200">취소</button>
                          <button onClick={saveIntro} className="text-[10px] bg-orange-400 text-white px-2 py-1 rounded-lg font-bold">저장</button>
                        </div>
                      )}
                    </div>
                    {!isEditingIntro ? (
                      <div className="text-sm font-bold text-stone-600 break-keep">{currentUser.intro || <span className="text-orange-400 font-medium">멋진 내 모습을 소개해보세요!</span>}</div>
                    ) : (
                      <input type="text" value={introText} onChange={e=>setIntroText(e.target.value)} maxLength={50} placeholder="최대 50자" className="w-full p-2 text-sm bg-white border border-orange-200 rounded-xl focus:ring-2 focus:ring-orange-300 font-bold outline-none text-stone-800" />
                    )}
                  </div>

                  <div className="bg-sky-50/50 p-4 rounded-3xl border border-sky-100">
                    <span className="text-sm font-black text-sky-800 block mb-2">🔑 아이모두 (i-modu)</span>
                    <div className="space-y-2">
                      <div className="flex items-center justify-between bg-white px-3 py-2 rounded-xl shadow-sm border border-sky-50">
                        <span className="text-xs font-bold text-stone-400">ID</span>
                        <ColorizeText text={currentUser.imoduId} />
                      </div>
                      <div className="flex items-center justify-between bg-white px-3 py-2 rounded-xl shadow-sm border border-sky-50">
                        <span className="text-xs font-bold text-stone-400">PW</span>
                        <ColorizeText text={currentUser.imoduPwd} />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div className="bg-white/90 p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-purple-100">
              <h3 className="font-black text-xl mb-5 text-purple-900 flex items-center gap-2">✨ 나의 칭호함</h3>
              {ownedTitles.length === 0 ? (
                <div className="text-center py-8 bg-purple-50/50 rounded-3xl text-purple-400 font-bold">선생님께 멋진 칭호를 받아보세요!</div>
              ) : (
                <div className="flex flex-wrap gap-3">
                  {ownedTitles.map((t, idx) => {
                    const isEquipped = currentUser.title === t;
                    return (
                      <button 
                        key={idx} onClick={() => selectTitle(t)} 
                        className={`px-5 py-3 rounded-2xl font-black text-sm transition-all ${isEquipped ? 'bg-purple-500 text-white shadow-md transform -translate-y-1' : 'bg-purple-50 text-purple-700 hover:bg-purple-100 border border-purple-100'}`}
                      >
                        {t} {isEquipped && '✅'}
                      </button>
                    )
                  })}
                </div>
              )}
            </div>

            <div className="bg-white/90 p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-pink-100">
              <h3 className="font-black text-xl mb-5 text-pink-800 flex items-center gap-2">🎨 내 옷장</h3>
              {ownedItems.length === 0 ? (
                <div className="text-center py-10 bg-pink-50/50 rounded-3xl text-pink-400 font-bold">상점에서 예쁜 아이템을 모아보세요!</div>
              ) : (
                <div className="grid grid-cols-3 md:grid-cols-5 lg:grid-cols-6 gap-4">
                  {ownedItems.map((itemId, idx) => {
                    const item = safeShopItems.find(i => String(i.id) === String(itemId));
                    if(!item) return null;
                    const isEquipped = equippedItems.some(id => String(id) === String(itemId));
                    return (
                      <button key={itemId || idx} onClick={() => toggleEquip(itemId)} className={`flex flex-col items-center p-4 rounded-3xl border-2 transition-all ${isEquipped ? 'border-pink-300 bg-pink-50 shadow-md' : 'border-white bg-stone-50 hover:border-pink-200'}`}>
                        <div className="w-16 h-16 mb-3 flex items-center justify-center bg-white rounded-2xl shadow-sm border border-stone-100">
                          {isImageUrl(item.icon) ? <img src={item.icon} alt={item.name} className="w-full h-full object-contain p-2" /> : <span className="text-4xl">{safeText(item.icon)}</span>}
                        </div>
                        <span className="text-xs font-black text-stone-700 text-center break-keep">{safeText(item.name)}</span>
                        {isEquipped && <span className="text-[10px] bg-pink-400 text-white px-3 py-1 rounded-full mt-2 font-bold shadow-sm">장착중</span>}
                      </button>
                    )
                  })}
                </div>
              )}
            </div>
            <div className="bg-white/90 p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-cyan-100 mt-6">
              <h3 className="font-black text-xl mb-5 text-cyan-800 flex items-center gap-2">🧑‍🤝‍🧑 우리반 친구들</h3>
              <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-4">
                {allStudents.filter(u => u.role === 'student').map(student => (
                  <button key={student.id} onClick={() => setSelectedStudentProfile(student)} className="flex flex-col items-center gap-2 hover:scale-105 transition-transform group">
                    <MiniAvatar student={student} shopItems={safeShopItems} sizeClass="w-14 h-14" textClass="text-3xl" borderClass="border-2 border-transparent group-hover:border-cyan-300 transition-colors" shadowClass="shadow-sm" />
                    <span className="text-xs font-black text-stone-700">{safeText(student.name)}</span>
                  </button>
                ))}
              </div>
            </div>

            {selectedStudentProfile && (
              <StudentProfileModal student={selectedStudentProfile} shopItems={safeShopItems} jobs={safeJobs} onClose={() => setSelectedStudentProfile(null)} />
            )}
          </div>
        );
      }


      function EmotionBoard({ currentUser, dbData, setDbData, syncToServer, showToast, updateStudentData }) {
        const moodZones = {
          red: { id: 'red', name: '빨강 구역', btnColor: 'bg-rose-400 text-white shadow-md', itemColor: 'bg-rose-50 text-rose-800 border-rose-200', emotions: [{ emoji: '😡', label: '화나요' }, { emoji: '😫', label: '짜증나요' }, { emoji: '😤', label: '답답해요' }, { emoji: '😬', label: '긴장돼요' }, { emoji: '😥', label: '걱정돼요' }, { emoji: '😰', label: '불안해요' }, { emoji: '😱', label: '무서워요' }, { emoji: '😳', label: '당황' }, { emoji: '🥺', label: '억울해요' }] },
          yellow: { id: 'yellow', name: '노랑 구역', btnColor: 'bg-amber-400 text-amber-900 shadow-md', itemColor: 'bg-amber-50 text-amber-900 border-amber-300', emotions: [{ emoji: '😆', label: '신나요' }, { emoji: '😀', label: '기뻐요' }, { emoji: '🥰', label: '행복해요' }, { emoji: '💓', label: '설레요' }, { emoji: '⚡', label: '활기차요' }, { emoji: '😲', label: '놀라워요' }, { emoji: '😎', label: '자랑스러워' }, { emoji: '💪', label: '자신있어요' }, { emoji: '🤩', label: '기대돼요' }] },
          blue: { id: 'blue', name: '파랑 구역', btnColor: 'bg-blue-400 text-white shadow-md', itemColor: 'bg-blue-50 text-blue-900 border-blue-200', emotions: [{ emoji: '😢', label: '슬퍼요' }, { emoji: '🌧️', label: '우울해요' }, { emoji: '😞', label: '실망했어요' }, { emoji: '🚶', label: '외로워요' }, { emoji: '🥱', label: '피곤해요' }, { emoji: '😒', label: '지루해요' }, { emoji: '🫠', label: '무기력해요' }, { emoji: '😔', label: '속상해요' }, { emoji: '🫣', label: '부끄러워요' }] },
          green: { id: 'green', name: '초록 구역', btnColor: 'bg-emerald-400 text-white shadow-md', itemColor: 'bg-emerald-50 text-emerald-900 border-emerald-200', emotions: [{ emoji: '😌', label: '편안해요' }, { emoji: '🍵', label: '차분해요' }, { emoji: '☁️', label: '여유로워요' }, { emoji: '😋', label: '만족해요' }, { emoji: '🤝', label: '다정해요' }, { emoji: '🙏', label: '감사해요' }, { emoji: '😮‍💨', label: '안심돼요' }, { emoji: '🐢', label: '느긋해요' }, { emoji: '🧸', label: '포근해요' }] }
        };

        const [selectedZone, setSelectedZone] = useState('yellow');
        const [selectedEmotion, setSelectedEmotion] = useState('😀');
        const [content, setContent] = useState('');
        const [isSecret, setIsSecret] = useState(false);
        const [postToDelete, setPostToDelete] = useState(null);
        const [selectedStudentProfile, setSelectedStudentProfile] = useState(null);

        const allEmotions = Object.values(moodZones).flatMap(zone => zone.emotions.map(e => ({ ...e, color: zone.itemColor })));

        const getAiReply = (emotionEmoji) => {
          const zone = Object.values(moodZones).find(z => z.emotions.some(e => e.emoji === emotionEmoji));
          if (!zone) return "소중한 마음을 나눠주어 고마워요. 선생님이 항상 응원합니다! 😊";
          if (zone.id === 'red') return "많이 힘들었겠어요. 화나고 답답한 마음을 솔직하게 털어놓은 것만으로도 정말 대단해요! 파도봇이 언제나 곁에서 응원할게요. 💪";
          if (zone.id === 'yellow') return "우와! 기분 좋은 일이 있었군요! 즐겁고 신나는 마음이 여기까지 전해지는 것 같아요. 앞으로도 이런 행복한 날들이 가득하기를 파도봇이 바랄게요! ✨";
          if (zone.id === 'blue') return "마음이 무겁고 슬플 땐 억지로 참지 않아도 괜찮아요. 파도봇이 옆에서 따뜻하게 안아줄게요. 푹 쉬고 나면 내일은 한결 더 나아질 거예요. 💙";
          if (zone.id === 'green') return "차분하고 평온한 마음 상태군요. 지금의 여유를 맘껏 즐기길 바라요! 스스로의 마음을 잘 돌보는 모습이 아주 멋져요. 🌿";
          return "오늘 하루도 수고 많았어요! 내일도 파이팅! 😊";
        };

        const handlePost = (e) => {
          e.preventDefault();
          if (!content) return;
          
          const aiReplyText = getAiReply(selectedEmotion);

          const newPost = { 
            id: Date.now().toString(), 
            studentId: currentUser.id, 
            studentName: currentUser.name, 
            emotion: selectedEmotion, 
            content, 
            date: new Date().toISOString().split('T')[0], 
            isSecret,
            likes: [],
            aiReply: aiReplyText
          };
          
          setDbData(prev => ({ ...prev, Emotions: [newPost, ...(prev.Emotions || [])] }));
          syncToServer('Emotions', 'INSERT', null, newPost);
          
          if (currentUser.role === 'student' && updateStudentData) {
            updateStudentData(currentUser.id, { exp: Number(currentUser.exp || 0) + 10 }, '마음 일기 작성');
          }

          setContent(''); setIsSecret(false);
          showToast(isSecret ? '비밀 일기가 등록되었습니다. 🔒 (+10 EXP)' : '마음 일기를 작성하여 경험치 10을 얻었습니다! ⭐');
        };

          const executeDelete = () => {
            if (!postToDelete) return;
            
            const post = (dbData.Emotions || []).find(p => p.id === postToDelete);
            
            setDbData(prev => ({ ...prev, Emotions: prev.Emotions.filter(p => p.id !== postToDelete) }));
            syncToServer('Emotions', 'DELETE', postToDelete, null);
            
            if (post && currentUser.role === 'student' && updateStudentData) {
              updateStudentData(currentUser.id, { exp: Math.max(0, Number(currentUser.exp || 0) - 10) }, '마음 일기 삭제');
            }
            
            showToast('?쇨린媛 ??젣?섏뿀?듬땲?? (寃쏀뿕移?-10)');
            setPostToDelete(null);
          };

        const handleLike = (postId) => {
          const post = emotionsData.find(p => p.id === postId);
          if(!post) return;
          const likes = Array.isArray(post.likes) ? post.likes : [];
          let newLikes;
          if (likes.includes(currentUser.id)) {
            newLikes = likes.filter(id => id !== currentUser.id);
          } else {
            newLikes = [...likes, currentUser.id];
          }
          setDbData(prev => ({
            ...prev,
            Emotions: prev.Emotions.map(p => p.id === postId ? { ...p, likes: newLikes } : p)
          }));
          syncToServer('Emotions', 'UPDATE', postId, { likes: newLikes });
        };

        const emotionsData = Array.isArray(dbData.Emotions) ? dbData.Emotions : [];
        const currentZoneData = moodZones[selectedZone];
        const todayString = new Date().toISOString().split('T')[0];
        const hasPostedToday = emotionsData.some(post => post.studentId === currentUser.id && post.date === todayString);

        const groupedEmotions = emotionsData.reduce((acc, post) => {
          const date = post.date || todayString;
          if (!acc[date]) acc[date] = [];
          acc[date].push(post);
          return acc;
        }, {});

        const dateKeys = Object.keys(groupedEmotions).sort((a, b) => new Date(b) - new Date(a));
        const [selectedDateTab, setSelectedDateTab] = useState(dateKeys.length > 0 ? dateKeys[0] : todayString);

        const todayEmotions = emotionsData.filter(p => p.date === todayString);
        const emotionSummary = {};
        todayEmotions.forEach(p => {
          emotionSummary[p.emotion] = (emotionSummary[p.emotion] || 0) + 1;
        });
        const topEmotions = Object.entries(emotionSummary).sort((a,b) => b[1] - a[1]);

        return (
          <div className="space-y-8">
            {topEmotions.length > 0 && (
              <div className="bg-white/80 backdrop-blur-md p-5 rounded-[2rem] shadow-sm border border-cyan-100 mb-6 flex flex-wrap gap-3 items-center">
                <span className="font-black text-cyan-800 mr-2">오늘 우리 반 기분 ☁️</span>
                {topEmotions.map(([emoji, count]) => {
                  const info = allEmotions.find(e => e.emoji === emoji);
                  return <span key={emoji} className="bg-white px-3 py-1.5 rounded-full font-bold text-sm shadow-sm border border-stone-100 text-stone-700">{emoji} {info ? info.label : '기분'} {count}명</span>
                })}
              </div>
            )}

            {currentUser.role !== 'parent' && (
              !hasPostedToday ? (
                <form onSubmit={handlePost} className="bg-white/90 backdrop-blur-md p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-sky-100 space-y-6">
                  <h3 className="font-black text-2xl text-sky-900 flex items-center gap-2 mb-4">🫧 지금 내 마음은?</h3>
                  
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    {Object.values(moodZones).map(zone => (
                      <button key={zone.id} type="button" onClick={() => {setSelectedZone(zone.id); setSelectedEmotion(zone.emotions[0].emoji);}} className={`p-4 rounded-3xl font-black flex flex-col items-center justify-center transition-all ${selectedZone === zone.id ? zone.btnColor + ' transform -translate-y-1 scale-105 border-2 border-white' : 'bg-stone-50 text-stone-500 hover:bg-stone-100 border border-stone-200'}`}>
                        <span className="text-xl">{zone.name}</span>
                      </button>
                    ))}
                  </div>

                  <div className={`p-6 rounded-[2.5rem] border-[3px] bg-white ${currentZoneData.itemColor.split(' ')[2]}`}>
                    <div className="grid grid-cols-3 gap-3">
                      {currentZoneData.emotions.map(emo => (
                        <button key={emo.label} type="button" onClick={() => setSelectedEmotion(emo.emoji)} className={`flex flex-col items-center justify-center p-3 rounded-2xl border-2 transition-all ${selectedEmotion === emo.emoji ? currentZoneData.itemColor + ' shadow-md scale-105' : 'bg-stone-50 border-stone-100 text-stone-400 grayscale hover:grayscale-0 hover:bg-white'}`}>
                          <span className="text-4xl mb-2 drop-shadow-sm">{emo.emoji}</span>
                          <span className="text-sm font-black">{emo.label}</span>
                        </button>
                      ))}
                    </div>
                    
                    <div className="mt-6 pt-6 border-t border-stone-100">
                      <div className="relative">
                        <textarea placeholder="무슨 일이 있었는지, 왜 그런 기분이 들었는지 편하게 이야기해주세요." value={content} onChange={e=>setContent(e.target.value)} rows="4" className="w-full bg-stone-50 border-2 border-stone-100 rounded-3xl px-6 py-5 focus:outline-none focus:ring-4 focus:ring-sky-100 focus:border-sky-300 font-bold text-stone-800 resize-none" required />
                        <div className="absolute bottom-4 right-4 flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-sm border border-stone-200">
                          <span className="text-xs font-black text-stone-600">🔒 비밀글</span>
                          <button type="button" onClick={() => setIsSecret(!isSecret)} className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${isSecret ? 'bg-sky-500' : 'bg-stone-300'}`}>
                            <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${isSecret ? 'translate-x-6' : 'translate-x-1'}`} />
                          </button>
                        </div>
                      </div>
                    </div>
                    <button type="submit" className="w-full bg-sky-500 hover:bg-sky-600 text-white font-black py-5 rounded-2xl shadow-md transition-transform hover:-translate-y-1 text-xl mt-4 border border-sky-600">일기장에 기록하기</button>
                  </div>
                </form>
              ) : (
                <div className="bg-sky-400 border-4 border-sky-200 text-white p-8 rounded-[2.5rem] shadow-sm flex flex-col items-center justify-center text-center gap-4 relative overflow-hidden">
                  <div className="absolute top-0 right-0 text-[10rem] opacity-20 transform translate-x-10 -translate-y-10">🫧</div>
                  <h3 className="font-black text-3xl z-10">기록 완료!</h3>
                  <p className="font-bold z-10 text-sky-50">오늘의 소중한 마음을 남겨주어 고마워요.</p>
                </div>
              )
            )}

            {dateKeys.length > 0 && (
              <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
                {dateKeys.map(date => (
                  <button 
                    key={date} 
                    onClick={() => setSelectedDateTab(date)}
                    className={`whitespace-nowrap px-5 py-2.5 rounded-full font-black text-sm transition-all shadow-sm ${selectedDateTab === date ? 'bg-sky-500 text-white' : 'bg-white text-stone-500 hover:bg-sky-50 border border-stone-200'}`}

              ) : (
                groupedEmotions[selectedDateTab].map(post => {
                  const emotionInfo = allEmotions.find(e => e.emoji === post.emotion) || { label: '기분', color: 'bg-stone-100 border-stone-300 text-stone-700' };
                  const postUser = dbData.Users.find(u => u.name === post.studentName);

                  const canViewContent = currentUser.role === 'teacher' || post.studentId === currentUser.id;
                  const postLikes = Array.isArray(post.likes) ? post.likes : [];
                  const isLiked = postLikes.includes(currentUser.id);
                  
                  return (
                    <div key={post.id} className="bg-white/95 backdrop-blur-sm p-6 rounded-[2rem] shadow-sm border border-stone-100 flex gap-5">
                      <div className="flex-1">
                        <div className="flex justify-between items-start mb-2">
                          <div className="flex items-center gap-3 flex-wrap">
                            <button onClick={() => postUser && setSelectedStudentProfile(postUser)} className="font-black text-stone-800 text-xl hover:text-sky-500 transition-colors flex items-center gap-2">
                              {safeText(post.studentName)}
                            </button>
                            <span className={`text-xs px-3 py-1.5 rounded-full font-black border-2 ${emotionInfo.color}`}>{post.emotion} {emotionInfo.label}</span>
                            {postIsSecret && <span className="text-xs bg-stone-200 text-stone-700 px-3 py-1.5 rounded-full font-black border border-stone-300">🔒 비밀</span>}
                          </div>
                          {(currentUser.role === 'teacher' || post.studentId === currentUser.id) && (
                            <div className="flex items-center gap-3">
                              <span className="text-xs text-stone-400 font-bold">{safeText(post.date)}</span>
                              <button onClick={() => setPostToDelete(post.id)} className="text-rose-400 hover:text-rose-600 font-bold text-xl bg-rose-50 p-2 rounded-xl">🗑️</button>
                            </div>
                          )}
                        </div>
                        
                        <div className={`mt-3 text-base leading-relaxed p-5 rounded-2xl font-bold border ${postIsSecret ? (canViewContent ? 'bg-indigo-50 border-indigo-200 text-indigo-900' : 'bg-stone-100 border-stone-200 text-stone-500 italic') : 'bg-sky-50 border-sky-100 text-sky-900'}`}>
                          {postIsSecret && !canViewContent ? '🤫 선생님께만 털어놓은 비밀 이야기예요.' : safeText(post.content)}
                        </div>

                        {(!postIsSecret || canViewContent) && post.aiReply && (
                          <div className="mt-3 bg-white/70 p-4 rounded-xl border border-sky-100 flex items-start gap-3">
                            <span className="text-2xl drop-shadow-sm">🤖</span>
                            <div>
                              <span className="text-xs font-black text-sky-600 block mb-1">파도봇의 답장</span>
                              <p className="text-sm font-bold text-stone-600 leading-relaxed">{safeText(post.aiReply)}</p>
                            </div>
                          </div>
                        )}

                        {(!postIsSecret || canViewContent) && currentUser.role !== 'parent' && (
                          <div className="mt-3 flex justify-end">
                            <button onClick={() => handleLike(post.id)} className={`flex items-center gap-1 text-sm font-bold px-3 py-1.5 rounded-full transition shadow-sm border ${isLiked ? 'bg-rose-50 text-rose-500 border-rose-100' : 'bg-white text-stone-400 border-stone-100 hover:bg-stone-50'}`}>
                              {isLiked ? '❤️' : '🤍'} {postLikes.length > 0 && postLikes.length}
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  )
                })
              )}
            </div>

            {postToDelete && (
              <div className="fixed inset-0 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                <div className="bg-white rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl text-center border-4 border-rose-200">
                  <h3 className="font-black text-2xl text-rose-700 mb-2">🚨 삭제 확인</h3>
                  <p className="text-stone-700 font-bold mb-8">정말 이 일기를 삭제할까요?</p>
                  <div className="flex gap-4">
                    <button onClick={() => setPostToDelete(null)} className="flex-1 bg-stone-200 text-stone-700 font-black py-4 rounded-2xl hover:bg-stone-300 transition">취소</button>
                    <button onClick={executeDelete} className="flex-1 bg-rose-500 text-white font-black py-4 rounded-2xl shadow-md hover:bg-rose-600 transition">삭제</button>
                  </div>
                </div>
              </div>

            {selectedStudentProfile && <StudentProfileModal student={selectedStudentProfile} shopItems={dbData.ShopItems} jobs={dbData.Jobs} onClose={() => setSelectedStudentProfile(null)} />}

        );
      }

        const equippedItems = Array.isArray(student.equippedItems) ? student.equippedItems : [];
        const safeShopItems = Array.isArray(shopItems) ? shopItems : [];
        const safeJobs = Array.isArray(jobs) ? jobs : [];
        const currentJob = safeJobs.find(j => j.name === student.job);
        const equippedIcons = equippedItems.map(id => safeShopItems.find(i => String(i.id) === String(id))?.icon).filter(Boolean);

        return (
          <div className="fixed inset-0 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center z-[200] p-4" onClick={onClose}>

              <button onClick={onClose} className="absolute top-5 right-5 text-stone-400 hover:text-stone-700 bg-stone-100 p-2 rounded-full font-black">✕</button>

                   {/* 장착한 아이템이 없을 때만 아바타 표시 */}
                   {equippedIcons.length === 0 && (
                     <span className="text-[4rem] drop-shadow-md text-orange-400">
                       {student.gender === 'M' ? '👦' : (student.gender === 'F' ? '👧' : '👤')}
                     </span>
                   )}
                   <div className="absolute inset-0 flex items-center justify-center drop-shadow-md pointer-events-none">
                     {equippedIcons.map((icon, idx) => (
                       isImageUrl(icon) ? <img key={idx} src={icon} alt="장착" className="absolute w-24 h-24 object-contain" /> : <span key={idx} className="absolute text-[4rem]">{safeText(icon)}</span>

                <div className="text-center">
                  <div className="flex gap-2 mb-2 justify-center flex-wrap">
                    {student.title && <span className="bg-orange-100 text-orange-900 text-xs font-black px-4 py-1.5 rounded-full inline-block shadow-sm border border-orange-200">✨ {safeText(student.title)}</span>}
                    {currentJob && <span className="bg-indigo-100 text-indigo-900 text-xs font-black px-4 py-1.5 rounded-full inline-block shadow-sm border border-indigo-200">💼 {safeText(currentJob.name)}</span>}
                  </div>
                  <div className="text-3xl font-black text-stone-800">{safeText(student.name)}</div>
                </div>
              </div>

              <div className="bg-sky-50/80 p-5 rounded-3xl border border-sky-100 mb-6 text-center shadow-sm">
                <span className="text-xs font-black text-sky-600 block mb-2">💬 한 줄 소개</span>
                <div className="text-sm font-bold text-stone-700 break-keep">
                  {student.intro || <span className="text-sky-400">아직 소개를 작성하지 않았어요.</span>}
                </div>
              </div>

              <div className="space-y-3 bg-stone-50 p-5 rounded-3xl border border-stone-100">
                <div className="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm border border-stone-50">
                  <span className="text-sm font-black text-stone-500">가진 돈</span>
                  <span className="font-black text-amber-600 text-lg">🪙 {student.money} 결</span>
                </div>
                <div className="bg-white p-4 rounded-2xl shadow-sm border border-stone-50">
                  <div className="flex justify-between font-black mb-2"><span className="text-sky-600 text-sm">Level {student.level}</span> <span className="text-sky-400 text-xs">{currentExp} / {EXP_PER_LEVEL}</span></div>
                  <div className="h-3 bg-sky-100 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-sky-400" style={{ width: `${expPercent}%` }}></div></div>

              </div>

      function HallOfFameManager({ currentUser, dbData, setDbData, syncToServer, showToast }) {
        const records = Array.isArray(dbData.HallOfFame) ? dbData.HallOfFame : [];
        
        const defaultCategories = ['스포츠', '곱셈', '나눗셈', '가가볼'];
        const existingCategories = [...new Set(records.map(r => r.category))];
        const allCategories = [...new Set([...defaultCategories, ...existingCategories])].filter(Boolean);
        
        const [activeTab, setActiveTab] = useState(allCategories[0] || '스포츠');
        
        const [categorySelect, setCategorySelect] = useState(allCategories[0] || '');
        const [customCategory, setCustomCategory] = useState('');
        const [showCustom, setShowCustom] = useState(false);
        
        const [studentName, setStudentName] = useState('');
        const [description, setDescription] = useState('');

        useEffect(() => {
          if (!allCategories.includes(activeTab) && allCategories.length > 0) {
            setActiveTab(allCategories[0]);
          }
        }, [allCategories, activeTab]);

        const handlePost = (e) => {
          e.preventDefault();
          const finalCategory = showCustom ? customCategory.trim() : categorySelect;
          if (!finalCategory || !studentName || !description) return;
          
          const newPost = { id: Date.now().toString(), category: finalCategory, studentName, description, date: new Date().toISOString().split('T')[0] };
          setDbData(prev => ({ ...prev, HallOfFame: [newPost, ...(prev.HallOfFame || [])] }));
          syncToServer('HallOfFame', 'INSERT', null, newPost);
          
          setStudentName(''); setDescription(''); setCustomCategory(''); setShowCustom(false);
          setActiveTab(finalCategory); 
          showToast('명예의 전당에 등록되었습니다! 🏆');
        };

        const executeDelete = (id) => {
          setDbData(prev => ({ ...prev, HallOfFame: prev.HallOfFame.filter(p => p.id !== id) }));
          syncToServer('HallOfFame', 'DELETE', id, null);
          showToast('기록이 삭제되었습니다.');
        };

        const filteredRecords = records.filter(r => r.category === activeTab);

        return (
          <div className="space-y-8">
            <div className="bg-amber-100 p-8 rounded-[2.5rem] shadow-sm text-amber-900 relative overflow-hidden border border-amber-200">
              <div className="absolute -right-4 -bottom-4 text-[8rem] opacity-30">🏆</div>
              <h2 className="text-3xl font-black mb-2 relative z-10">명예의 전당</h2>
              <p className="font-bold opacity-90 relative z-10">파도반을 빛낸 멋진 친구들을 기념하는 곳입니다!</p>
            </div>

            {currentUser.role === 'teacher' && (
              <form onSubmit={handlePost} className="bg-white/90 p-6 rounded-[2rem] shadow-sm border border-amber-200 space-y-4">
                <h3 className="font-black text-lg text-amber-900">🎖️ 새로운 기록 등록</h3>
                <div className="flex gap-2">
                  {!showCustom ? (
                    <>
                      <select value={categorySelect} onChange={e=>setCategorySelect(e.target.value)} className="w-1/3 bg-amber-50 border border-amber-100 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-300 font-bold text-stone-800">
                        {allCategories.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                      <button type="button" onClick={() => setShowCustom(true)} className="bg-amber-200 hover:bg-amber-300 text-amber-800 font-black px-4 rounded-xl transition" title="분야 직접 추가">➕</button>
                    </>
                  ) : (
                    <>
                      <input type="text" placeholder="새로운 분야 이름" value={customCategory} onChange={e=>setCustomCategory(e.target.value)} className="w-1/3 bg-white border border-amber-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400 font-bold text-stone-800" required />
                      <button type="button" onClick={() => {setShowCustom(false); setCustomCategory('');}} className="bg-stone-200 hover:bg-stone-300 text-stone-600 font-black px-4 rounded-xl transition" title="취소">✕</button>
                    </>
                  )}
                  <input type="text" placeholder="학생 이름" value={studentName} onChange={e=>setStudentName(e.target.value)} className="flex-1 bg-amber-50 border border-amber-100 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-300 font-bold text-stone-800" required />
                </div>
                <textarea placeholder="선정 이유 및 멋진 활약을 적어주세요." value={description} onChange={e=>setDescription(e.target.value)} rows="2" className="w-full bg-amber-50 border border-amber-100 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-300 font-bold resize-none text-stone-800" required />
                <button type="submit" className="w-full bg-amber-400 text-amber-900 font-black py-4 rounded-xl shadow-md hover:bg-amber-500 transition border border-amber-500">전당에 올리기 🏆</button>
              </form>
            )}

            {allCategories.length > 0 && (
              <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
                {allCategories.map(cat => (
                  <button 
                    key={cat} 
                    onClick={() => setActiveTab(cat)}
                    className={`whitespace-nowrap px-5 py-2.5 rounded-full font-black text-sm transition-all shadow-sm ${activeTab === cat ? 'bg-amber-400 text-white' : 'bg-white text-stone-500 hover:bg-amber-50 border border-stone-200'}`}
                  >
                    {cat}
                  </button>
                ))}
              </div>
            )}

            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
              {filteredRecords.length === 0 ? (
                <div className="col-span-full text-center py-10 text-amber-700 bg-white/50 border border-amber-100 rounded-[2rem] font-black">이 분야에 아직 등록된 기록이 없습니다.</div>
              ) : (
                filteredRecords.map(record => (
                  <div key={record.id} className="bg-white/95 p-6 rounded-[2rem] shadow-sm border border-amber-200 flex flex-col justify-between relative overflow-hidden group">
                    <div className="absolute top-0 right-0 w-24 h-24 bg-amber-50 rounded-bl-[100px] -z-10 transition-transform group-hover:scale-110"></div>
                    <div>
                      <div className="flex justify-between items-start mb-4">
                        <div>
                          <span className="bg-amber-200 border border-amber-300 text-amber-900 text-xs font-black px-3 py-1 rounded-full">{safeText(record.category)}</span>
                          <h4 className="font-black text-2xl text-stone-900 mt-2">{safeText(record.studentName)}</h4>
                        </div>
                        {currentUser.role === 'teacher' && (
                          <button onClick={() => executeDelete(record.id)} className="text-rose-400 hover:text-rose-600 font-black text-xl bg-rose-50 p-2 rounded-full">✕</button>
                        )}
                      </div>
                      <p className="text-slate-700 font-bold text-sm leading-relaxed mb-4">{safeText(record.description)}</p>
                    </div>
                    <div className="text-xs text-stone-500 font-bold text-right border-t border-slate-100 pt-3">{safeText(record.date)} 기록</div>
                  </div>
                ))
              )}
            </div>
          </div>
        );
      }

                <button type="submit" className="w-full bg-sky-400 hover:bg-sky-500 text-white font-black py-4 rounded-xl shadow-md transition border border-sky-500">알림장 쓰기</button>

            <div className="space-y-4">

                </div>
              ))}
            </div>
          </div>
        );
      }


      function ApprovalManager({ dbData, setDbData, syncToServer, showToast }) {
        const handleApprove = (item) => {
          const newItem = { id: Date.now().toString(), name: item.itemName, icon: item.icon, price: 500, type: item.type };
          setDbData(prev => ({ ...prev, ShopItems: [...prev.ShopItems, newItem], PendingItems: prev.PendingItems.filter(i => i.id !== item.id) }));
          syncToServer('ShopItems', 'INSERT', null, newItem); syncToServer('PendingItems', 'DELETE', item.id, null);
          showToast('승인 완료!');
        };
        const handleReject = (id) => {
          setDbData(prev => ({ ...prev, PendingItems: prev.PendingItems.filter(i => i.id !== id) }));
          syncToServer('PendingItems', 'DELETE', id, null);
          showToast('거절 완료.');
        };
        if (dbData.PendingItems.length === 0) return <div className="text-center py-10 text-sky-700 bg-white/50 border border-sky-100 font-black rounded-[2rem]">대기중인 아이템이 없습니다.</div>;
        return (
          <div className="space-y-4">
            {dbData.PendingItems.map(item => (
              <div key={item.id} className="bg-white/95 p-5 rounded-[2rem] shadow-sm border border-sky-200 flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="bg-stone-50 w-16 h-16 rounded-2xl flex items-center justify-center border border-stone-200">
                    {isImageUrl(item.icon) ? <img src={item.icon} alt={item.itemName} className="w-full h-full object-contain p-1" /> : <span className="text-4xl">{safeText(item.icon)}</span>}
                  </div>
                  <div>
                    <div className="text-xs font-bold text-sky-600 mb-1">{safeText(item.studentName)}의 제안</div>
                    <div className="font-black text-lg text-stone-900">{safeText(item.itemName)}</div>
                  </div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => handleApprove(item)} className="bg-emerald-400 text-white border border-emerald-500 px-4 py-3 rounded-xl font-black shadow-sm hover:bg-emerald-500 transition">승인</button>
                  <button onClick={() => handleReject(item.id)} className="bg-rose-400 text-white border border-rose-500 px-4 py-3 rounded-xl font-black shadow-sm hover:bg-rose-500 transition">거절</button>
                </div>
              </div>
            ))}
          </div>
        );
      }


      function JobManager({ currentUser, dbData, setDbData, syncToServer, showToast }) {
        const [jobName, setJobName] = useState('');
        const [jobSalary, setJobSalary] = useState('');

          e.preventDefault();

          const newJob = { id: Date.now().toString(), name: jobName, salary: Number(jobSalary) };
          setDbData(prev => ({ ...prev, Jobs: [...(prev.Jobs || []), newJob] }));

          setJobName(''); setJobSalary('');
          showToast('새로운 직업이 등록되었습니다! 💼');
        };

        const executeDelete = (id) => {
          setDbData(prev => ({ ...prev, Jobs: prev.Jobs.filter(j => j.id !== id) }));
          syncToServer('Jobs', 'DELETE', id, null);
          showToast('직업이 삭제되었습니다.');
        };

        const jobs = Array.isArray(dbData.Jobs) ? dbData.Jobs : [];

        return (
          <div className="space-y-8">
            <div className="bg-indigo-100 p-8 rounded-[2.5rem] shadow-sm text-indigo-900 relative overflow-hidden border border-indigo-200">
              <div className="absolute -right-4 -bottom-4 text-[8rem] opacity-30">💼</div>
              <h2 className="text-3xl font-black mb-2 relative z-10">직업 관리</h2>
              <p className="font-bold opacity-90 relative z-10">우리 반 친구들의 멋진 직업과 월급을 설정해주세요!</p>

      function generateAnonymousName(id) {
        const adjectives = ['행복한', '기쁜', '즐거운', '신나는', '따뜻한', '포근한', '상쾌한', '짜릿한', '든든한', '흐뭇한', '자랑스러운', '평온한', '활기찬', '다정한', '친절한', '용감한', '씩씩한', '지혜로운', '똑똑한', '귀여운', '멋진', '아름다운', '반짝이는', '사랑스러운', '다부진', '상냥한', '유쾌한', '느긋한', '감동적인', '희망찬'];
        const animals = ['강아지', '고양이', '토끼', '다람쥐', '햄스터', '쿼카', '알파카', '사슴', '판다', '코알라', '병아리', '오리', '펭귄', '돌고래', '수달', '해달', '물개', '거북이', '고슴도치', '기린', '코끼리', '호랑이', '사자', '곰', '여우', '늑대', '독수리', '부엉이', '참새', '제비'];
        const strId = String(id);
        let hash = 0;
        for (let i = 0; i < strId.length; i++) {
          hash = strId.charCodeAt(i) + ((hash << 5) - hash);
        }
        const adjIndex = Math.abs(hash) % adjectives.length;
        const animalIndex = Math.abs(hash >> 5) % animals.length;
        return adjectives[adjIndex] + ' ' + animals[animalIndex];
      }

              <div className="relative z-10">
                <h2 className="text-2xl font-black mb-2 flex items-center gap-2">🚿 이주의 칭찬 샤워</h2>
                <p className="text-sky-800 font-bold opacity-90">이번 주 칭찬 대상자에게 따뜻한 마음을 전해 보세요!</p>
              </div>
            </div>

            <div className="bg-white/90 p-6 rounded-[2rem] shadow-sm border border-stone-100">
              <h3 className="text-lg font-black text-stone-800 mb-4">👑 칭찬 명예의 전당 (가장 많이 칭찬한 친구)</h3>
              {topSenders.length === 0 ? (
                <div className="text-center py-4 text-stone-400 font-bold bg-stone-50 rounded-2xl border border-dashed border-stone-200">아직 칭찬 기록이 없습니다.</div>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                  {topSenders.map((sender, index) => (
                    <div key={sender[0]} className="bg-gradient-to-b from-amber-50 to-orange-50 p-4 rounded-2xl border border-amber-200 flex flex-col items-center justify-center relative shadow-sm">
                      <div className="text-3xl mb-1">{index === 0 ? '🥇' : index === 1 ? '🥈' : '🥉'}</div>
                      <div className="font-black text-stone-800 text-lg">{sender[0]}</div>
                      <div className="text-sm font-bold text-amber-600 mt-1">{sender[1]}번 칭찬!</div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="bg-white/90 p-6 rounded-[2rem] shadow-sm border border-stone-100">
              <h3 className="text-lg font-black text-stone-800 mb-4">✨ 현재 진행 중인 칭찬 샤워</h3>
              {activeTargets.length === 0 ? (
                <div className="text-center py-8 text-stone-400 font-bold bg-stone-50 rounded-2xl border border-dashed border-stone-200">현재 선정된 대상이 없습니다.</div>
              ) : (
                <div className="grid grid-cols-2 gap-4">
                  {activeTargets.map(t => {
                    const count = complimentLetters.filter(l => l.receiverId === t.studentId).length;
                    return (
                      <button key={t.id} onClick={() => setSelectedTarget({ id: t.studentId, name: t.studentName, isPast: false })} className={`p-4 rounded-2xl transition flex flex-col items-center justify-center border-2 ${selectedTarget?.id === t.studentId ? 'border-cyan-400 bg-cyan-50 shadow-md transform scale-105' : 'border-stone-100 bg-stone-50 hover:border-cyan-200'}`}>
                        <div className="mb-2"><MiniAvatar student={(Array.isArray(dbData.Users) ? dbData.Users : []).find(u => u.id === t.studentId)} shopItems={dbData.ShopItems} sizeClass="w-12 h-12" textClass="text-2xl" borderClass="border border-stone-200" shadowClass="" /></div>
                        <div className="font-black text-stone-800 text-lg">{t.studentName}</div>
                        <div className="text-sm font-bold text-cyan-600 mt-1">칭찬 {count}개</div>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>

            {selectedTarget && (
              <div className="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-lg border border-cyan-100 relative">
                <button onClick={() => setSelectedTarget(null)} className="absolute top-6 right-6 text-stone-400 hover:text-rose-500 font-black">X</button>
                <h3 className="text-2xl font-black text-cyan-900 mb-6 flex items-center gap-2">
                  🚿 {selectedTarget.name}에게 남겨진 칭찬 {selectedTarget.isPast && <span className="text-sm bg-stone-100 text-stone-500 px-2 py-1 rounded-lg">지난 칭찬</span>}
                </h3>
                
                <div className="space-y-4 mb-6 max-h-[300px] overflow-y-auto custom-scrollbar pr-2">
                  {complimentLetters.filter(l => l.receiverId === selectedTarget.id).length === 0 ? (
                    <div className="text-center py-10 text-stone-400 font-bold bg-stone-50 rounded-3xl">아직 칭찬 글이 없습니다. 첫 칭찬을 남겨보세요!</div>
                  ) : (
                    complimentLetters.filter(l => l.receiverId === selectedTarget.id).map(letter => {
                      const postLikes = Array.isArray(letter.likes) ? letter.likes : [];
                      const isLiked = postLikes.includes(currentUser.id);
                      return (
                      <div key={letter.id} className="bg-gradient-to-r from-sky-50 to-cyan-50 p-5 rounded-2xl border border-cyan-100 relative">
                        <div className="flex justify-between items-start mb-2">
                          <span className="font-black text-cyan-700">From. {generateAnonymousName(letter.id)} 🤫</span>
                          <span className="text-xs text-stone-400 font-bold">{letter.date}</span>
                        </div>
                        <div className="font-bold text-stone-800 whitespace-pre-wrap leading-relaxed mb-3">{letter.content}</div>
                        {currentUser.role !== 'parent' && (
                          <div className="flex justify-end">
                            <button onClick={() => handleLike(letter.id)} className={`flex items-center gap-1 text-sm font-bold px-3 py-1.5 rounded-full transition shadow-sm border ${isLiked ? 'bg-rose-50 text-rose-500 border-rose-100' : 'bg-white text-stone-400 border-stone-100 hover:bg-stone-50'}`}>
                              {isLiked ? '❤️' : '🤍'} {postLikes.length > 0 && postLikes.length}
                            </button>
                          </div>
                        )}
                      </div>
                    )})
                  )}
                </div>

                {!selectedTarget.isPast && currentUser.id !== selectedTarget.id && currentUser.role !== 'parent' && (
                  <form onSubmit={handleSend} className="bg-cyan-50/50 p-4 rounded-3xl border border-cyan-100 mt-4">
                    <textarea 
                      placeholder={`${selectedTarget.name} 친구를 칭찬하는 따뜻한 글을 남겨주세요!`}
                      value={content} 
                      onChange={e=>setContent(e.target.value)} 
                      rows="3" 
                      className="w-full bg-white border-none rounded-2xl px-4 py-3 focus:ring-2 focus:ring-cyan-300 font-bold resize-none text-stone-800 mb-3 shadow-inner" 
                      required 
                    />
                    <button type="submit" className="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-black py-4 rounded-xl shadow-md transition">칭찬 샤워 내리기 🚿✨</button>
                  </form>
                )}
                {!selectedTarget.isPast && currentUser.id === selectedTarget.id && (
                  <div className="text-center py-4 text-cyan-600 font-black bg-cyan-50 rounded-2xl border border-cyan-100">자신에게는 칭찬 글을 남길 수 없습니다. 친구들의 칭찬을 읽어보세요! 😊</div>
                )}
              </div>
            )}

            <div className="bg-white/90 p-6 rounded-[2rem] shadow-sm border border-stone-100">
              <h3 className="text-lg font-black text-stone-800 mb-4">🕰️ 지난 칭찬 대상자</h3>
              {pastTargets.length === 0 ? (
                <div className="text-center py-8 text-stone-400 font-bold">지난 대상자가 없습니다.</div>
              ) : (
                <div className="flex flex-wrap gap-2">
                  {pastTargets.map(t => (
                    <button key={t.id} onClick={() => setSelectedTarget({ id: t.studentId, name: t.studentName, isPast: true })} className="bg-stone-50 hover:bg-stone-100 border border-stone-200 px-4 py-2 rounded-xl font-bold text-stone-600 transition">
                      {t.studentName}
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      }

            const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
