<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>?뙄 ?뚮룄諛?/title>
    <!-- Tailwind CSS (?붿옄?? -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (湲곕뒫) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (肄붾뱶 踰덉뿭湲? -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
      body, html { margin: 0; padding: 0; min-height: 100vh; background-color: #f0f9ff; }
      #root { min-height: 100vh; }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #7dd3fc; }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // ==========================================
      // ?슚 ?덈줈 諛고룷???뱀빋 URL (?앹뿉 ?api=true ?꾩닔)
      // ==========================================
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzev5JeOhBVHDe1Uy6EIFSEOH_BEP2YTncgLjrQB4kRIWc-hCk3uv0hbrcdoiHjAMIj/exec?api=true'; 
      const EXP_PER_LEVEL = 100;

      const safeText = (val) => {
        if (val === null || val === undefined) return '';
        if (typeof val === 'object') return JSON.stringify(val);
        return String(val);
      };

      const isImageUrl = (str) => {
        if (!str || typeof str !== 'string') return false;
        return str.startsWith('http://') || str.startsWith('https://') || str.startsWith('data:image/');
      };

      const ColorizeText = ({ text }) => {
        if (!text) return <span className="text-slate-400 text-xs">?뺣낫 ?놁쓬</span>;
        return (
          <div className="flex gap-[1px] tracking-widest text-lg">
            {String(text).split('').map((char, idx) => {
              if (/[a-zA-Z]/.test(char)) {
                return <span key={idx} className="text-blue-500 font-black">{char}</span>; 
              } else if (/[0-9]/.test(char)) {
                return <span key={idx} className="text-rose-500 font-black">{char}</span>; 
              }
              return <span key={idx} className="text-slate-600 font-bold">{char}</span>; 
            })}
          </div>
        );
      };

      function App() {
        const [loading, setLoading] = useState(true);
        const [syncing, setSyncing] = useState(false);
        
        // ?뮕 援먯궗???먮룞 ?묒냽 ?륁뻔 ?쒓굅, localStorage ?뺤씤留??섑뻾
        const [currentUser, setCurrentUser] = useState(() => {
          const savedUser = localStorage.getItem('padoUser');
          if (savedUser) {
            try { return JSON.parse(savedUser); } catch(e) {}
          }
          return null;
        });
        
        const [missingDbSheets, setMissingDbSheets] = useState([]);
        const [toastMsg, setToastMsg] = useState('');
        
        const [showPwdModal, setShowPwdModal] = useState(false);

        const [dbData, setDbData] = useState({
          Users: [], Announcements: [], ShopItems: [], PendingItems: [], Emotions: [], HallOfFame: [], Tasks: [], Jobs: [], PurchaseLogs: [], Records: [], RecordCategories: [], Letters: []
        });

        const [loginName, setLoginName] = useState('');
        const [loginPwd, setLoginPwd] = useState('');
        const [loginError, setLoginError] = useState('');

        const showToast = (msg) => {
          setToastMsg(msg);
          setTimeout(() => setToastMsg(''), 3000);
        };

        const fetchData = async () => {
          setLoading(true);
          try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            
            const requiredSheets = ['Users', 'Announcements', 'ShopItems', 'PendingItems', 'Emotions', 'HallOfFame', 'Tasks', 'Jobs', 'PurchaseLogs', 'Records', 'RecordCategories', 'Letters'];
            const missingSheets = requiredSheets.filter(sheet => !data[sheet]);
            
            if (missingSheets.length > 0) {
              setMissingDbSheets(missingSheets);
              showToast(`?좑툘 ?쒗듃 ?꾨씫: [ ${missingSheets.join(', ')} ]`);
            } else {
              setMissingDbSheets([]);
            }

            const safeParseArray = (val) => {
              if (!val) return [];
              if (typeof val === 'number') return [val]; 
              if (typeof val === 'string') {
                try { 
                  const parsed = JSON.parse(val); 
                  return Array.isArray(parsed) ? parsed : [];
                } catch(e) { return []; }
              }
              if (Array.isArray(val)) return val;
              return [];
            };

            const parsedUsers = (Array.isArray(data.Users) ? data.Users : []).map(u => ({
              ...u,
              role: u.name === '?ㅼ?泥? ? 'teacher' : 'student',
              ownedItems: safeParseArray(u.ownedItems),
              equippedItems: safeParseArray(u.equippedItems),
              ownedTitles: safeParseArray(u.ownedTitles),
              intro: safeText(u.intro),
              faceUrl: safeText(u.faceUrl), 
              imoduId: safeText(u.imoduId), 
              imoduPwd: safeText(u.imoduPwd),
              job: safeText(u.job)
            }));

            const parsedTasks = (Array.isArray(data.Tasks) ? data.Tasks : []).map(t => ({
              ...t,
              submittedUsers: safeParseArray(t.submittedUsers),
              approvedUsers: safeParseArray(t.approvedUsers)
            }));
            
            const parsedEmotions = (Array.isArray(data.Emotions) ? data.Emotions : []).map(e => ({
              ...e,
              likes: safeParseArray(e.likes),
              aiReply: safeText(e.aiReply)
            }));

            setDbData({
              ...data,
              Users: parsedUsers,
              Announcements: Array.isArray(data.Announcements) ? data.Announcements : [],
              ShopItems: Array.isArray(data.ShopItems) ? data.ShopItems : [],
              PendingItems: Array.isArray(data.PendingItems) ? data.PendingItems : [],
              Emotions: parsedEmotions,
              HallOfFame: Array.isArray(data.HallOfFame) ? data.HallOfFame : [],
              Tasks: parsedTasks,
              Jobs: Array.isArray(data.Jobs) ? data.Jobs : [],
              PurchaseLogs: Array.isArray(data.PurchaseLogs) ? data.PurchaseLogs : [],
              Records: Array.isArray(data.Records) ? data.Records : [],
              RecordCategories: Array.isArray(data.RecordCategories) ? data.RecordCategories : [],
              Letters: Array.isArray(data.Letters) ? data.Letters : []
            });
          } catch (error) {
            console.error("Data Fetch Error:", error);
            if (error.message.includes("Failed to fetch") || error.name === "TypeError") {
              setMissingDbSheets(["(?깆뒪?ㅽ겕由쏀듃 ?곌껐 臾몄젣)"]);
              showToast("?슚 SCRIPT_URL 臾몄젣?닿굅???깆뒪?ㅽ겕由쏀듃????踰꾩쟾??諛고룷?섏? ?딆븯?듬땲??");
            } else {
              showToast("?곗씠?곕? 遺덈윭?ㅻ뒗???ㅽ뙣?덉뒿?덈떎.");
            }
          } finally {
            setLoading(false);
          }
        };

        useEffect(() => { fetchData(); }, []);

        const syncToServer = async (sheetName, action, id, updateData) => {
          setSyncing(true);
          try {
            const res = await fetch(SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ sheetName, action, id, data: updateData })
            });
            const result = await res.json();
            if (result.success === false) alert(`????ㅽ뙣: ${result.error}`);
          } catch (error) {
            console.error("Sync Error:", error);
            alert("?곗씠?곕? ??ν븯吏 紐삵뻽?듬땲?? (?ㅽ듃?뚰겕 ?ㅻ쪟)");
          } finally {
            setSyncing(false);
          }
        };

        const handleLogin = (e) => {
          e.preventDefault();
          const user = dbData.Users.find(u => String(u.name).trim() === String(loginName).trim() && String(u.pwd).trim() === String(loginPwd).trim());
          
          if (user) {
            setCurrentUser(user);
            localStorage.setItem('padoUser', JSON.stringify(user)); // 釉뚮씪?곗??????            setLoginError('');
            showToast(`?섏쁺?⑸땲?? ${user.name}?? ?뙄`);

            const pwdStr = String(user.pwd).trim();
            if (user.role === 'student') {
              if (!/^\d{4}$/.test(pwdStr) || ['1234', '1111', '0000'].includes(pwdStr)) {
                setShowPwdModal(true);
              }
            }
          } else {
            setLoginError('?대쫫?대굹 鍮꾨?踰덊샇媛 ??몄뒿?덈떎.');
          }
        };

        const updateStudentData = (studentId, updates) => {
          const studentToUpdate = dbData.Users.find(u => u.id === studentId);
          if (!studentToUpdate) return;
          
          const updatedStudent = { ...studentToUpdate, ...updates };
          
          if (updates.exp !== undefined) {
            updatedStudent.exp = Number(updatedStudent.exp || 0);
            updatedStudent.level = Math.floor(updatedStudent.exp / EXP_PER_LEVEL) + 1;
          }
          if (updates.money !== undefined) {
            updatedStudent.money = Number(updatedStudent.money || 0);
          }

          setDbData(prev => ({
            ...prev,
            Users: prev.Users.map(u => u.id === studentId ? updatedStudent : u)
          }));

          if (currentUser?.id === studentId) {
            setCurrentUser(updatedStudent);
          }

          const dataToSync = {
            exp: updatedStudent.exp,
            level: updatedStudent.level,
            money: updatedStudent.money,
            title: updatedStudent.title,
            ownedItems: updatedStudent.ownedItems,
            equippedItems: updatedStudent.equippedItems,
            ownedTitles: updatedStudent.ownedTitles,
            intro: updatedStudent.intro,
            faceUrl: updatedStudent.faceUrl,
            job: updatedStudent.job
          };
          if (updates.pwd !== undefined) dataToSync.pwd = updates.pwd;
          
          syncToServer('Users', 'UPDATE', studentId, dataToSync);
        };

        const batchUpdateStudents = async (studentIds, type, val) => {
          setSyncing(true);
          let newUsers = [...dbData.Users];
          const updatePayloads = [];

          studentIds.forEach(id => {
            const student = newUsers.find(u => u.id === id);
            if (student) {
              const updated = { ...student };
              
              if (type === 'exp') {
                updated.exp = Number(student.exp || 0) + Number(val);
                updated.level = Math.floor(updated.exp / EXP_PER_LEVEL) + 1;
              } else if (type === 'money') {
                updated.money = Number(student.money || 0) + Number(val);
              }
              
              newUsers = newUsers.map(u => u.id === id ? updated : u);

              updatePayloads.push({
                id: id,
                data: {
                  exp: updated.exp, 
                  level: updated.level, 
                  money: updated.money, 
                  title: updated.title,
                  ownedItems: updated.ownedItems, 
                  equippedItems: updated.equippedItems,
                  ownedTitles: updated.ownedTitles, 
                  intro: updated.intro,
                  faceUrl: updated.faceUrl,
                  job: updated.job
                }
              });
            }
          });

          setDbData(prev => ({ ...prev, Users: newUsers }));

          for (const payload of updatePayloads) {
            try {
              await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ sheetName: 'Users', action: 'UPDATE', id: payload.id, data: payload.data })
              });
            } catch(e) { console.error(e); }
          }
          setSyncing(false);
          showToast(`?꾩껜 ?숈깮?먭쾶 ${type === 'money' ? '?⑸룉' : '寃쏀뿕移?} 吏湲됱씠 ?꾨즺?섏뿀?듬땲??`);
        };

        if (loading) {
          return (
            <div className="min-h-screen bg-[#FFFDF8] flex flex-col items-center justify-center space-y-4">
              <div className="text-6xl animate-bounce mb-4 drop-shadow-md">?뙄</div>
              <p className="text-sky-800 font-bold text-lg">?뚮룄諛??곗씠?곕? 遺덈윭?ㅻ뒗 以?..</p>
            </div>
          );
        }

        if (!currentUser) {
          return <LoginScreen loginName={loginName} setLoginName={setLoginName} loginPwd={loginPwd} setLoginPwd={setLoginPwd} handleLogin={handleLogin} loginError={loginError} />;
        }

        return (
          <div className="min-h-screen bg-gradient-to-b from-cyan-100 to-blue-100 text-slate-800 font-sans pb-24 md:pb-0 relative selection:bg-cyan-300">
            {toastMsg && (
              <div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-cyan-900/90 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-2xl z-50 font-bold flex items-center gap-2 animate-bounce">
                ?ェ {toastMsg}
              </div>
            )}
            
            <header className="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-10 border-b border-cyan-300">
              <div className="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
                <h1 className="text-2xl font-black text-cyan-700 flex items-center gap-2">
                  ?뙄 ?뚮룄諛?                </h1>
                <div className="flex items-center gap-4">
                  {syncing && <span className="animate-spin inline-block text-cyan-600">?봽</span>}
                  
                  <button onClick={fetchData} className="p-2 text-stone-500 hover:text-cyan-600 transition" title="?덈줈怨좎묠">
                    ?봽
                  </button>

                  <span className="font-bold text-cyan-900 bg-cyan-200 px-3 py-1.5 rounded-full text-sm hidden md:inline-block">{safeText(currentUser.name)} {currentUser.role === 'teacher' ? '?좎깮?? : '?숈깮'}</span>
                  
                  <button onClick={() => {
                    setCurrentUser(null);
                    localStorage.removeItem('padoUser'); // 濡쒓렇?꾩썐 ??釉뚮씪?곗? 湲곗뼲 ??젣
                    window.history.replaceState({}, document.title, window.location.pathname); 
                  }} className="p-2 text-2xl hover:scale-110 transition drop-shadow-sm" title="濡쒓렇?꾩썐">?슞</button>
                </div>
              </div>
            </header>

            {missingDbSheets.length > 0 && (
              <div className="max-w-5xl mx-auto p-4 mt-4 mx-4 bg-rose-100 text-rose-800 rounded-3xl border border-rose-300 shadow-sm">
                <h3 className="font-bold text-lg mb-1">?슚 援ш? ?곌껐 ?ㅻ쪟</h3>
                <p className="text-sm mb-2">?ㅽ봽?덈뱶?쒗듃 ?곗씠?곕? 媛?몄삤吏 紐삵뻽?듬땲?? ?깆뒪?ㅽ겕由쏀듃????踰꾩쟾??諛고룷?댁＜?몄슂.</p>
              </div>
            )}

            <main className="max-w-5xl mx-auto p-4 mt-4">
              {currentUser.role === 'teacher' ? (
                <TeacherDashboard currentUser={currentUser} dbData={dbData} setDbData={setDbData} updateStudentData={updateStudentData} syncToServer={syncToServer} showToast={showToast} batchUpdateStudents={batchUpdateStudents} />
              ) : (
                <StudentDashboard currentUser={currentUser} dbData={dbData} setDbData={setDbData} updateStudentData={updateStudentData} syncToServer={syncToServer} showToast={showToast} onOpenPwdModal={() => setShowPwdModal(true)} />
              )}
            </main>

            {showPwdModal && (
              <PasswordChangeModal 
                onClose={() => setShowPwdModal(false)} 
                onSave={(newPwd) => {
                  updateStudentData(currentUser.id, { pwd: newPwd });
                  setShowPwdModal(false);
                  showToast('鍮꾨?踰덊샇媛 ?덉쟾?섍쾶 蹂寃쎈릺?덉뒿?덈떎! ?뵍');
                }} 
              />
            )}
          </div>
        );
      }

      function LoginScreen({ loginName, setLoginName, loginPwd, setLoginPwd, handleLogin, loginError }) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-cyan-200 to-blue-300 p-4 relative overflow-hidden">
            <div className="absolute top-0 right-0 w-96 h-96 bg-white/40 rounded-full blur-3xl transform translate-x-1/3 -translate-y-1/3 pointer-events-none"></div>
            <div className="absolute bottom-0 left-0 w-96 h-96 bg-cyan-400/30 rounded-full blur-3xl transform -translate-x-1/3 translate-y-1/3 pointer-events-none"></div>

            <div className="bg-white/95 backdrop-blur-md p-10 rounded-[3rem] shadow-2xl w-full max-w-md border-[6px] border-white relative z-10">
              <div className="text-center mb-10">
                <div className="w-32 h-32 mx-auto mb-6 flex items-center justify-center bg-cyan-100 rounded-full border-4 border-cyan-300 shadow-inner overflow-hidden relative">
                  <img src="https://i.postimg.cc/cLsf9TH7/padoban-sangjing.png" alt="?뚮룄諛??곸쭠" className="w-full h-full object-contain p-4 drop-shadow-sm z-10 relative" />
                  <div className="absolute bottom-0 w-full h-1/2 bg-blue-200/50"></div>
                </div>
                <h1 className="text-4xl font-black text-cyan-900 tracking-tight">?뚮룄諛?濡쒓렇??/h1>
                <p className="text-cyan-700 mt-2 font-bold bg-cyan-100 inline-block px-4 py-1.5 rounded-full">?곕━ 諛섏쓽 ?됰났??怨듦컙 ?맫</p>
              </div>
              
              <form onSubmit={handleLogin} className="space-y-5">
                <div>
                  <label className="block text-sm font-black text-cyan-900 mb-2 pl-3">???대쫫</label>
                  <input 
                    type="text" value={loginName} onChange={(e) => setLoginName(e.target.value)}
                    className="w-full px-6 py-4 rounded-[1.5rem] border-2 border-cyan-100 focus:outline-none focus:border-cyan-400 focus:ring-4 focus:ring-cyan-50 bg-stone-50 font-black text-lg text-stone-800 placeholder:text-stone-300 transition-all shadow-inner"
                    placeholder="?대쫫???낅젰?섏꽭?? required
                  />
                </div>
                <div>
                  <label className="block text-sm font-black text-cyan-900 mb-2 pl-3">鍮꾨?踰덊샇</label>
                  <input 
                    type="password" value={loginPwd} onChange={(e) => setLoginPwd(e.target.value)}
                    className="w-full px-6 py-4 rounded-[1.5rem] border-2 border-cyan-100 focus:outline-none focus:border-cyan-400 focus:ring-4 focus:ring-cyan-50 bg-stone-50 font-black text-lg text-stone-800 placeholder:text-stone-300 transition-all shadow-inner"
                    placeholder="鍮꾨?踰덊샇" required
                  />
                </div>
                {loginError && (
                  <div className="bg-rose-100 text-rose-700 p-3 rounded-2xl text-center font-bold text-sm border border-rose-200 animate-pulse">
                    {loginError}
                  </div>
                )}
                <button type="submit" className="w-full bg-gradient-to-r from-cyan-400 to-cyan-500 hover:from-cyan-500 hover:to-cyan-600 text-white font-black py-5 px-4 rounded-[1.5rem] shadow-xl shadow-cyan-300/50 transition-all transform hover:-translate-y-1 active:scale-95 text-xl mt-4 border-b-4 border-cyan-700/40">
                  臾??닿린 ?슞
                </button>
              </form>
            </div>
          </div>
        );
      }

      function PasswordChangeModal({ onClose, onSave }) {
        const [pwd1, setPwd1] = useState('');
        const [pwd2, setPwd2] = useState('');
        const [errorMsg, setErrorMsg] = useState('');

        const handleSubmit = (e) => {
          e.preventDefault();
          if (!/^\d{4}$/.test(pwd1)) {
            setErrorMsg('鍮꾨?踰덊샇???レ옄 4?먮━濡??낅젰?댁＜?몄슂. (?? 0715)');
            return;
          }
          if (pwd1 !== pwd2) {
            setErrorMsg('鍮꾨?踰덊샇媛 ?쒕줈 ?ㅻ쫭?덈떎. ?ㅼ떆 ?뺤씤?댁＜?몄슂.');
            return;
          }
          onSave(pwd1);
        };

        return (
          <div className="fixed inset-0 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center z-[200] p-4">
            <div className="bg-white rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl relative border-4 border-orange-200">
              <div className="text-center mb-6">
                <span className="text-5xl drop-shadow-md block mb-3">?뵍</span>
                <h3 className="font-black text-2xl text-stone-800">鍮꾨?踰덊샇 ?ㅼ젙</h3>
                <p className="text-sm font-bold text-stone-500 mt-2 break-keep">?덉쟾???섎쭔??4?먮━ ?レ옄 鍮꾨?踰덊샇瑜?留뚮뱾?댁＜?몄슂!</p>
              </div>

              <form onSubmit={handleSubmit} className="space-y-4">
                <div>
                  <input type="password" placeholder="?덈줈??4?먮━ ?レ옄 ?낅젰" value={pwd1} onChange={e => setPwd1(e.target.value)} maxLength={4} className="w-full bg-orange-50 border-2 border-orange-100 rounded-2xl px-5 py-4 font-black text-center text-2xl focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-50 text-stone-800 tracking-[0.5em]" required />
                </div>
                <div>
                  <input type="password" placeholder="鍮꾨?踰덊샇 ??踰????뺤씤" value={pwd2} onChange={e => setPwd2(e.target.value)} maxLength={4} className="w-full bg-orange-50 border-2 border-orange-100 rounded-2xl px-5 py-4 font-black text-center text-2xl focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-50 text-stone-800 tracking-[0.5em]" required />
                </div>
                
                {errorMsg && <p className="text-rose-600 text-sm font-bold text-center bg-rose-100 p-3 rounded-xl border border-rose-200">{errorMsg}</p>}
                
                <div className="flex gap-3 mt-6">
                  <button type="button" onClick={onClose} className="flex-1 bg-stone-100 text-stone-500 font-black py-4 rounded-2xl hover:bg-stone-200 transition">?섏쨷??/button>
                  <button type="submit" className="flex-1 bg-orange-400 hover:bg-orange-500 text-white font-black py-4 rounded-2xl shadow-md transition transform hover:-translate-y-1">蹂寃쏀븯湲?/button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      function TeacherDashboard({ currentUser, dbData, setDbData, updateStudentData, syncToServer, showToast, batchUpdateStudents }) {
        const [activeTab, setActiveTab] = useState('students');

                <form onSubmit={handleUploadSubmit} className="mt-4 bg-white/95 p-6 rounded-[2rem] shadow-sm border border-sky-200 space-y-4">
                  <div className="flex gap-4">
                    <input type="text" value={newItemIcon} onChange={e=>setNewItemIcon(e.target.value)} className="w-1/4 text-center text-2xl p-3 bg-white border border-sky-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-400 font-bold" placeholder="?대え吏/URL" required />
                    <input type="text" value={newItemName} onChange={e=>setNewItemName(e.target.value)} className="w-3/4 p-3 bg-white border border-sky-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-400 font-bold text-stone-800" placeholder="?꾩씠???대쫫" required />
                  </div>
                  <button type="submit" className="w-full bg-sky-600 hover:bg-sky-700 border border-sky-700 text-white font-black py-4 rounded-xl shadow-md transition">?좎깮?섍퍡 蹂대궡湲?/button>
                </form>
              )}
            </div>
          </div>
        );
      }

      function ApprovalManager({ dbData, setDbData, syncToServer, showToast }) {
        const handleApprove = (item) => {
          const newItem = { id: Date.now().toString(), name: item.itemName, icon: item.icon, price: 500, type: item.type };
          setDbData(prev => ({ ...prev, ShopItems: [...prev.ShopItems, newItem], PendingItems: prev.PendingItems.filter(i => i.id !== item.id) }));
          syncToServer('ShopItems', 'INSERT', null, newItem); syncToServer('PendingItems', 'DELETE', item.id, null);
          showToast('?뱀씤 ?꾨즺!');
        };
        const handleReject = (id) => {
          setDbData(prev => ({ ...prev, PendingItems: prev.PendingItems.filter(i => i.id !== id) }));
          syncToServer('PendingItems', 'DELETE', id, null);
          showToast('嫄곗젅 ?꾨즺.');
        };
        if (dbData.PendingItems.length === 0) return <div className="text-center py-10 text-sky-700 bg-white/50 border border-sky-100 font-black rounded-[2rem]">?湲곗쨷???꾩씠?쒖씠 ?놁뒿?덈떎.</div>;
        return (
          <div className="space-y-4">
            {dbData.PendingItems.map(item => (
              <div key={item.id} className="bg-white/95 p-5 rounded-[2rem] shadow-sm border border-sky-200 flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="bg-stone-50 w-16 h-16 rounded-2xl flex items-center justify-center border border-stone-200">
                    {isImageUrl(item.icon) ? <img src={item.icon} alt={item.itemName} className="w-full h-full object-contain p-1" /> : <span className="text-4xl">{safeText(item.icon)}</span>}
                  </div>
                  <div>
                    <div className="text-xs font-bold text-sky-600 mb-1">{safeText(item.studentName)}???쒖븞</div>
                    <div className="font-black text-lg text-stone-900">{safeText(item.itemName)}</div>
                  </div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => handleApprove(item)} className="bg-emerald-400 text-white border border-emerald-500 px-4 py-3 rounded-xl font-black shadow-sm hover:bg-emerald-500 transition">?뱀씤</button>
                  <button onClick={() => handleReject(item.id)} className="bg-rose-400 text-white border border-rose-500 px-4 py-3 rounded-xl font-black shadow-sm hover:bg-rose-500 transition">嫄곗젅</button>
                </div>
              </div>
            ))}
          </div>
        );
      }

      function JobManager({ currentUser, dbData, setDbData, syncToServer, showToast }) {
        const [jobName, setJobName] = useState('');
        const [jobSalary, setJobSalary] = useState('');

        const handlePost = (e) => {
          e.preventDefault();
          if (!jobName || !jobSalary) return;
          const newJob = { id: Date.now().toString(), name: jobName, salary: Number(jobSalary) };
          setDbData(prev => ({ ...prev, Jobs: [...(prev.Jobs || []), newJob] }));
          syncToServer('Jobs', 'INSERT', null, newJob);
          setJobName(''); setJobSalary('');
          showToast('?덈줈??吏곸뾽???깅줉?섏뿀?듬땲?? ?뮳');
        };

        const executeDelete = (id) => {
          setDbData(prev => ({ ...prev, Jobs: prev.Jobs.filter(j => j.id !== id) }));
          syncToServer('Jobs', 'DELETE', id, null);
          showToast('吏곸뾽????젣?섏뿀?듬땲??');
        };

        const jobs = Array.isArray(dbData.Jobs) ? dbData.Jobs : [];

        return (
          <div className="space-y-8">
            <div className="bg-indigo-100 p-8 rounded-[2.5rem] shadow-sm text-indigo-900 relative overflow-hidden border border-indigo-200">
              <div className="absolute -right-4 -bottom-4 text-[8rem] opacity-30">?뮳</div>
              <h2 className="text-3xl font-black mb-2 relative z-10">吏곸뾽 愿由?/h2>
              <p className="font-bold opacity-90 relative z-10">?곕━ 諛?移쒓뎄?ㅼ쓽 硫뗭쭊 吏곸뾽怨??붽툒???ㅼ젙?댁＜?몄슂!</p>
            </div>

            <form onSubmit={handlePost} className="bg-white/90 p-6 rounded-[2rem] shadow-sm border border-indigo-100 space-y-4">
              <h3 className="font-black text-lg text-indigo-900">?뮳 ?덈줈??吏곸뾽 ?깅줉</h3>
              <div className="flex gap-4">
                <input type="text" placeholder="吏곸뾽 ?대쫫 (?? ??됱썝)" value={jobName} onChange={e=>setJobName(e.target.value)} className="w-2/3 bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800 shadow-inner" required />
                <input type="number" placeholder="?붽툒 (?? 500)" value={jobSalary} onChange={e=>setJobSalary(e.target.value)} className="w-1/3 bg-stone-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-300 font-bold text-stone-800 shadow-inner" required />
              </div>
              <button type="submit" className="w-full bg-indigo-500 text-white font-black py-4 rounded-xl shadow-md hover:bg-indigo-600 transition">吏곸뾽 留뚮뱾湲?/button>
            </form>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
              {jobs.length === 0 ? (
                <div className="col-span-full text-center py-10 text-indigo-400 font-black bg-white/50 border border-indigo-100 rounded-[2rem]">?꾩쭅 ?깅줉??吏곸뾽???놁뒿?덈떎.</div>
              ) : (
                jobs.map(job => (
                  <div key={job.id} className="bg-white/95 p-6 rounded-[2rem] shadow-sm border border-indigo-100 flex flex-col justify-between relative overflow-hidden group">
                    <div className="flex justify-between items-start mb-2">
                      <div>
                        <span className="bg-indigo-100 text-indigo-800 text-xs font-black px-3 py-1 rounded-full">?뮳 吏곸뾽</span>
                        <h4 className="font-black text-xl text-stone-800 mt-2">{safeText(job.name)}</h4>
                      </div>
                      <button onClick={() => executeDelete(job.id)} className="text-stone-300 hover:text-rose-500 font-black text-xl bg-rose-50 w-8 h-8 flex items-center justify-center rounded-full transition-colors" title="??젣">??/button>
                    </div>
                    <div className="mt-4 pt-3 border-t border-stone-50">
                      <span className="text-sm font-bold text-stone-500">?붽툒:</span>
                      <span className="font-black text-amber-600 ml-2">?첌 {job.salary}??/span>
                    </div>
                  </div>
                ))
              )}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
